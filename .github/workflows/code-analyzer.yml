name: Salesforce Code Analyzer

on:
  pull_request:
    branches:
      - development
    types: [opened, edited, synchronized, reopened]
  push:
    branches:
      - development

jobs:
  salesforce-code-analyzer-scan:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
    steps:
      - name: 'Check out source code'
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # Step 1: Find all changed files and create a list
      - name: 'Get changed files in PR'
        id: changed-files
        uses: tj-actions/changed-files@v44
        with:
          # Match Salesforce file types, like Apex classes, Triggers, and LWC files
          files: |
            **/*.cls
            **/*.trigger
            **/*.cmp
            **/*.js
            **/*.css
            **/*.html

      # Step 2: Set the list of changed files as the target for the scan
      - name: 'Run Salesforce Code Analyzer on changed files'
        if: ${{ steps.changed-files.outputs.any_changed == 'true' }}
        uses: forcedotcom/run-code-analyzer@v2
        id: scan-step
        with:
          run-arguments: '--view detail --output-file sfca_results.json --target "${{ steps.changed-files.outputs.all_changed_files }}"'

      # Step 3: Check for violations and fail job if necessary
      - name: 'Check for violations and set job status'
        if: ${{ steps.scan-step.outputs.num-violations > 0 }}
        run: |
          echo "Salesforce Code Analyzer found ${{ steps.scan-step.outputs.num-violations }} violations."
          exit 1
