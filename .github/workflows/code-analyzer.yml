name: Salesforce Code Analyzer

on:
  pull_request:
    branches:
      - development
    types: [opened, edited, synchronized, reopened]
  push:
    branches:
      - development

jobs:
  salesforce-code-analyzer-scan:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
    steps:
      - name: 'Check out source code'
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # Install Salesforce CLI
      - name: 'Install Salesforce CLI'
        run: npm install -g @salesforce/cli@latest

      # Install Code Analyzer Plugin
      - name: 'Install Salesforce Code Analyzer Plugin'
        run: sf plugins install code-analyzer@latest

      # Step 1: Find all changed files and create a list
      - name: 'Get changed files in PR'
        id: changed-files
        uses: tj-actions/changed-files@v44
        with:
          files: |
            **/*.cls
            **/*.trigger
            **/*.cmp
            **/*.js
            **/*.css
            **/*.html

      # Step 2: Prepare file list for Code Analyzer
      - name: 'Prepare file list for analysis'
        if: ${{ steps.changed-files.outputs.any_changed == 'true' }}
        id: prepare-files
        run: |
          changed_files="${{ steps.changed-files.outputs.all_changed_files }}"
          formatted_files=$(echo "$changed_files" | tr ' ' ',')
          echo "target-files=$formatted_files" >> $GITHUB_OUTPUT

      # Step 3: Run Code Analyzer with post-processing to exclude NoTrailingWhitespace
      - name: 'Run Salesforce Code Analyzer on changed files'
        if: ${{ steps.changed-files.outputs.any_changed == 'true' }}
        continue-on-error: true
        id: scan-step
        run: |
          # Run the analyzer normally first
          sf code-analyzer run \
            --view detail \
            --output-file sfca_results_raw.json \
            --target "${{ steps.prepare-files.outputs.target-files }}"
          
          # Check if results file exists
          if [ -f sfca_results_raw.json ]; then
            echo "scan-completed=true" >> $GITHUB_OUTPUT
            
            # Count NoTrailingWhitespace violations before filtering
            trailing_whitespace_count=$(jq '(.results // [] | map(.violations // [] | map(select(.rule == "NoTrailingWhitespace")) | length) | add // 0)' sfca_results_raw.json 2>/dev/null || echo "0")
            echo "Found $trailing_whitespace_count NoTrailingWhitespace violations to filter out"
            
            # Filter out NoTrailingWhitespace violations from the JSON
            jq --argjson whitespace_count "$trailing_whitespace_count" '
              # Filter violations from results array
              .results = (.results // [] | map(
                if has("violations") then
                  .violations = (.violations | map(select(.rule != "NoTrailingWhitespace")))
                else . end
              )) |
              
              # Update violation counts - subtract the NoTrailingWhitespace count from total and sev5
              .violationCounts.total = (.violationCounts.total - $whitespace_count) |
              .violationCounts.sev5 = (.violationCounts.sev5 - $whitespace_count)
            ' sfca_results_raw.json > sfca_results.json
            
            # Extract total violations from filtered violationCounts
            total_violations=$(jq '.violationCounts.total // 0' sfca_results.json 2>/dev/null || echo "0")
            echo "Total violations found (after filtering out NoTrailingWhitespace): $total_violations"
            echo "num-violations=$total_violations" >> $GITHUB_OUTPUT
            
            # Debug: Show what was filtered
            original_count=$(jq '.violationCounts.total // 0' sfca_results_raw.json 2>/dev/null || echo "0")
            echo "Original violations: $original_count, Filtered out: $trailing_whitespace_count NoTrailingWhitespace violations"
            
            # Debug: Show JSON structure to understand violation format
            echo "=== Violation Structure Debug ==="
            echo "Sample violation from results:"
            jq '.results[0].violations[0] // "No violations found"' sfca_results.json 2>/dev/null || echo "Failed to get sample violation"
            echo "=== End Debug ==="
          else
            echo "scan-completed=false" >> $GITHUB_OUTPUT
            echo "num-violations=0" >> $GITHUB_OUTPUT
            echo "❌ Results file not found!"
          fi

      # Step 4: Custom violation summary and display
      - name: 'Custom Code Quality Report'
        if: ${{ steps.scan-step.outputs.scan-completed == 'true' }}
        run: |
          echo "# 🔍 Code Quality Analysis Report" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "_NoTrailingWhitespace violations have been excluded from this report._" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
          total_violations=${{ steps.scan-step.outputs.num-violations }}
          
          # Extract violation counts from violationCounts object
          critical_count=$(jq '.violationCounts.sev1 // 0' sfca_results.json 2>/dev/null || echo "0")
          high_count=$(jq '.violationCounts.sev2 // 0' sfca_results.json 2>/dev/null || echo "0")
          medium_count=$(jq '.violationCounts.sev3 // 0' sfca_results.json 2>/dev/null || echo "0")
          low_count=$(jq '.violationCounts.sev4 // 0' sfca_results.json 2>/dev/null || echo "0")
          info_count=$(jq '.violationCounts.sev5 // 0' sfca_results.json 2>/dev/null || echo "0")
          
          echo "Violation counts extracted (NoTrailingWhitespace excluded):"
          echo "Critical: $critical_count, High: $high_count, Medium: $medium_count, Low: $low_count, Info: $info_count"
          
          # Summary table
          echo "## 📊 Violation Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Severity | Count | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|----------|-------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| 🔴 Critical | $critical_count | $([ $critical_count -eq 0 ] && echo "✅ Pass" || echo "❌ Fail") |" >> $GITHUB_STEP_SUMMARY
          echo "| 🟠 High | $high_count | $([ $high_count -eq 0 ] && echo "✅ Pass" || echo "⚠️ Review") |" >> $GITHUB_STEP_SUMMARY
          echo "| 🟡 Medium | $medium_count | $([ $medium_count -eq 0 ] && echo "✅ Pass" || echo "ℹ️ Consider") |" >> $GITHUB_STEP_SUMMARY
          echo "| 🔵 Low | $low_count | $([ $low_count -eq 0 ] && echo "✅ Pass" || echo "ℹ️ Optional") |" >> $GITHUB_STEP_SUMMARY
          echo "| ⚪ Info | $info_count | $([ $info_count -eq 0 ] && echo "✅ Pass" || echo "ℹ️ Info") |" >> $GITHUB_STEP_SUMMARY
          echo "| **Total** | **$total_violations** | $([ $total_violations -eq 0 ] && echo "✅ **PASS**" || echo "❌ **REVIEW REQUIRED**") |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
          if [ $total_violations -gt 0 ]; then 
            echo "## 🚨 Issues Found" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "The following code quality issues were detected (NoTrailingWhitespace excluded):" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            
            # Create detailed violation table (sorted by severity, then line)
            echo "<details><summary>📋 Detailed Violations (Click to Expand)</summary>" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "| Severity | Rule | Description | File | Line | Column | Message | Fix Suggestion | Reference |" >> $GITHUB_STEP_SUMMARY
            echo "|----------|------|-------------|------|------|--------|---------|----------------|------------|" >> $GITHUB_STEP_SUMMARY

            # Dump one sample violation (debug) so we can see actual field names if parsing fails
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "#### Sample violation (raw JSON) for diagnostics" >> $GITHUB_STEP_SUMMARY
            echo '```json' >> $GITHUB_STEP_SUMMARY
            jq '.results[]?.violations[]? // .violations[]? | . as $v | $v' sfca_results.json | jq 'select(.) | . as $x | $x' -M | head -n 200 >> $GITHUB_STEP_SUMMARY 2>/dev/null || echo '"No sample violation (check JSON structure)"' >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY

            # Robust extraction: support alternative field names (.rule, .ruleId, .name), messages and locations, sorted by severity and line
            jq -r '
              # gather violations from possible locations
              ( [ (.results[]? | .violations[]?), (.violations[]?) ] | add // [] ) as $all |
              $all |
              sort_by(.severity // 5, (.line // 0)) |
              map(
                . as $vi |
                # normalize fields (rule, message, file, line, column)
                ( ($vi.rule // $vi.ruleId // $vi.name // "Unknown") ) as $rule |
                ( ($vi.message // $vi.desc // $vi.description // "No message") | gsub("\n"; " ") ) as $message |
                ( ($vi.fileName // $vi.file // ($vi.locations[0].file // $vi.locations[0].fileName) // "Unknown") ) as $file |
                ( ($vi.line // $vi.locations[0].startLine // "?") | tostring ) as $line |
                ( ($vi.column // $vi.locations[0].startColumn // "-") | tostring ) as $column |
                ( if ($vi.severity|type) == "string" then ($vi.severity|tonumber? // ($vi.severity)) else ($vi.severity // 5) end ) as $sevnum |
                # severity badge
                ( if $sevnum == 1 then "🔴 Critical"
                  elif $sevnum == 2 then "🟠 High"
                  elif $sevnum == 3 then "🟡 Medium"
                  elif $sevnum == 4 then "🔵 Low"
                  elif $sevnum == 5 then "⚪ Info"
                  else "❓ Unknown" end ) as $severity_badge |
                # description mapping using substring tests (robust if rule contains prefixes)
                ( if ($rule | test("ApexCRUDViolation")) then "Missing CRUD/FLS Security Checks"
                  elif ($rule | test("AvoidHardcodingId")) then "Hardcoded Salesforce IDs"
                  elif ($rule | test("AvoidDmlStatementsInLoops")) then "DML Operations in Loops"
                  elif ($rule | test("AvoidSoqlInLoops")) then "SOQL Queries in Loops"
                  elif ($rule | test("CyclomaticComplexity")) then "High Code Complexity"
                  elif ($rule | test("StdCyclomaticComplexity")) then "High Method Complexity"
                  elif ($rule | test("TooManyFields")) then "Too Many Class Fields"
                  elif ($rule | test("UnusedLocalVariable")) then "Unused Local Variables"
                  elif ($rule | test("EmptyIfStmt")) then "Empty If Statements"
                  elif ($rule | test("EmptyTryOrFinallyBlock")) then "Empty Try/Finally Block"
                  elif ($rule | test("MethodNamingConventions")) then "Method Naming Conventions"
                  elif ($rule | test("ClassNamingConventions")) then "Class Naming Conventions"
                  elif ($rule | test("VariableNamingConventions")) then "Variable Naming Conventions"
                  else $rule end ) as $description |
                # fix suggestion mapping
                ( if ($rule | test("ApexCRUDViolation")) then "Add WITH USER_MODE or check permissions"
                  elif ($rule | test("AvoidHardcodingId")) then "Use Custom Settings/Metadata"
                  elif ($rule | test("AvoidDmlStatementsInLoops")) then "Move DML outside loops"
                  elif ($rule | test("AvoidSoqlInLoops")) then "Move SOQL outside loops"
                  elif ($rule | test("CyclomaticComplexity") or ($rule | test("StdCyclomaticComplexity"))) then "Break into smaller methods"
                  elif ($rule | test("UnusedLocalVariable")) then "Remove unused variable"
                  elif ($rule | test("EmptyIfStmt")) then "Add code or remove statement"
                  else "Follow Salesforce best practices" end ) as $fix_suggestion |
                # reference link (example for common rules; customize as needed)
                ( if ($rule | test("ApexCRUDViolation")) then "[Salesforce Docs](https://developer.salesforce.com/docs/atlas.en-us.apexcode.meta/apexcode/apex_security_crud_fls.htm)"
                  elif ($rule | test("AvoidHardcodingId")) then "[PMD Rule](https://pmd.github.io/pmd/pmd_rules_apex_bestpractices.html#avoidhardcodingid)"
                  else "-" end ) as $reference |
                # build markdown table row
                "| " + $severity_badge + " | `" + ($rule|gsub("`"; "\\`")) + "` | " + ($description|gsub("\\|"; "/")) + " | `" + ($file|gsub("`"; "\\`")) + "` | " + $line + " | " + $column + " | " + ($message|gsub("\\|"; "/")|gsub("`"; "'")) + " | " + ($fix_suggestion|gsub("\\|"; "/")) + " | " + $reference + " |"
              ) | .[]
            ' sfca_results.json >> $GITHUB_STEP_SUMMARY 2>/dev/null || {
              echo "| ⚠️ Error | Parse Failed | - | - | - | - | Could not parse violation details | Check logs | - |" >> $GITHUB_STEP_SUMMARY
            }

            echo "</details>" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY

            # Add grouped summary by rule type (sorted by count descending)
            echo "<details><summary>📊 Summary by Rule Type (Click to Expand)</summary>" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "| Rule | Count | Severity | Description |" >> $GITHUB_STEP_SUMMARY
            echo "|------|-------|----------|-------------|" >> $GITHUB_STEP_SUMMARY

            jq -r '
              ( [ (.results[]? | .violations[]?), (.violations[]?) ] | add // [] ) as $all |
              $all | group_by( ( .rule // .ruleId // .name // "Unknown" ) ) |
              sort_by(-length) |
              map(
                .[0] as $first |
                ( ($first.rule // $first.ruleId // $first.name // "Unknown") ) as $rule |
                ( length ) as $count |
                ( ($first.severity // 5) ) as $sevnum |
                ( if $sevnum == 1 then "🔴 Critical"
                  elif $sevnum == 2 then "🟠 High"
                  elif $sevnum == 3 then "🟡 Medium"
                  elif $sevnum == 4 then "🔵 Low"
                  elif $sevnum == 5 then "⚪ Info"
                  else "❓ Unknown" end ) as $severity_badge |
                ( if ($rule | test("ApexCRUDViolation")) then "Missing CRUD/FLS Security Checks"
                  elif ($rule | test("AvoidHardcodingId")) then "Hardcoded Salesforce IDs"
                  elif ($rule | test("AvoidDmlStatementsInLoops")) then "DML Operations in Loops"
                  elif ($rule | test("AvoidSoqlInLoops")) then "SOQL Queries in Loops"
                  elif ($rule | test("CyclomaticComplexity")) then "High Code Complexity"
                  elif ($rule | test("StdCyclomaticComplexity")) then "High Method Complexity"
                  elif ($rule | test("UnusedLocalVariable")) then "Unused Local Variables"
                  elif ($rule | test("EmptyIfStmt")) then "Empty If Statements"
                  elif ($rule | test("MethodNamingConventions")) then "Method Naming Issues"
                  elif ($rule | test("ClassNamingConventions")) then "Class Naming Issues"
                  elif ($rule | test("VariableNamingConventions")) then "Variable Naming Issues"
                  else $rule end ) as $description |
                "| `" + ($rule|gsub("`"; "\\`")) + "` | " + ($count|tostring) + " | " + $severity_badge + " | " + ($description|gsub("\\|"; "/")) + " |"
              ) | .[]
            ' sfca_results.json >> $GITHUB_STEP_SUMMARY 2>/dev/null || {
              echo "| Parse Error | - | - | Could not group violations by rule |" >> $GITHUB_STEP_SUMMARY
            }
            
            echo "</details>" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "### 💡 Quick Fix Guide" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "**Security Issues (Critical/High):** Focus on CRUD/FLS violations and hardcoded IDs first" >> $GITHUB_STEP_SUMMARY
            echo "**Performance Issues:** Fix SOQL/DML in loops to avoid governor limits" >> $GITHUB_STEP_SUMMARY  
            echo "**Code Quality:** Address complexity and naming convention issues" >> $GITHUB_STEP_SUMMARY
            echo "**Style Issues:** Clean up unused variables and empty statements" >> $GITHUB_STEP_SUMMARY
            
          else
            echo "## ✅ Excellent Work!" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "🎉 No code quality issues found in your changes. Your code meets all quality standards!" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "### What was checked:" >> $GITHUB_STEP_SUMMARY
            echo "- ✅ Code style and formatting" >> $GITHUB_STEP_SUMMARY
            echo "- ✅ Security best practices" >> $GITHUB_STEP_SUMMARY
            echo "- ✅ Performance patterns" >> $GITHUB_STEP_SUMMARY
            echo "- ✅ Salesforce platform guidelines" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "_Note: NoTrailingWhitespace violations are automatically excluded from this analysis._" >> $GITHUB_STEP_SUMMARY
          fi
          
          # Console output with friendly formatting
          echo ""
          echo "════════════════════════════════════════════════════════════════"
          echo "🔍 CODE QUALITY ANALYSIS COMPLETE"
          echo "════════════════════════════════════════════════════════════════"
          echo ""
          echo "📊 SUMMARY (NoTrailingWhitespace excluded):"
          echo "  🔴 Critical: $critical_count"
          echo "  🟠 High:     $high_count"
          echo "  🟡 Medium:   $medium_count"
          echo "  🔵 Low:      $low_count"
          echo "  ⚪ Info:     $info_count"
          echo "  ────────────────"
          echo "  📈 Total:    $total_violations"
          echo ""
          
          if [ $total_violations -gt 0 ]; then
            echo "📋 ISSUES DETECTED:"
            echo "  • $critical_count Critical security/performance issues"
            echo "  • $high_count High-priority issues"
            echo "  • $medium_count Medium-priority issues"
            echo "  • $low_count Low-priority issues"
            echo "  • $info_count Informational/style issues"
            echo ""
            echo "💡 Check the 'Summary' tab above for detailed violation table."
          else
            echo "✅ EXCELLENT: No violations found! Your code is clean. 🎉"
          fi
          echo ""
          echo "════════════════════════════════════════════════════════════════"

      # Step 5: Determine build status
      - name: 'Evaluate Build Status'
        if: ${{ steps.scan-step.outputs.scan-completed == 'true' }}
        run: |
          total_violations=${{ steps.scan-step.outputs.num-violations }}
          
          # Get critical and high severity counts
          critical_count=$(jq '.violationCounts.sev1 // 0' sfca_results.json 2>/dev/null || echo "0")
          high_count=$(jq '.violationCounts.sev2 // 0' sfca_results.json 2>/dev/null || echo "0")
          
          if [ $critical_count -gt 0 ]; then
            echo "🚨 Build FAILED: $critical_count critical security/performance issues found."
            echo "❌ Critical issues must be fixed before merging."
            exit 1
          elif [ $high_count -gt 0 ]; then
            echo "⚠️ Build WARNING: $high_count high-priority issues found."
            echo "🔧 Please review and consider fixing these issues."
            echo "Build will continue but please address these concerns."
            exit 0
          elif [ $total_violations -gt 0 ]; then
            echo "ℹ️ Build PASSED: $total_violations minor code style issues found."
            echo "💡 Consider fixing these for better code quality."
            exit 0
          else
            echo "✅ Build PASSED: No code quality issues found!"
            exit 0
          fi

      # Step 6: Handle case when no files changed
      - name: 'No files to analyze'
        if: ${{ steps.changed-files.outputs.any_changed != 'true' }}
        run: |
          echo "ℹ️ No relevant files were changed in this commit/PR."
          echo "✅ Code analysis skipped - no Salesforce files to analyze."