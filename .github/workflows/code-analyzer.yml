name: Salesforce Code Analyzer

on:
  pull_request:
    branches:
      - development
    types: [opened, edited, synchronized, reopened]
  push:
    branches:
      - development

jobs:
  salesforce-code-analyzer-scan:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
    steps:
      - name: 'Check out source code'
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Salesforce CLI
        run: npm install -g @salesforce/cli@latest

      - name: Install Code Analyzer Plugin
        run: sf plugins install code-analyzer@latest

      - name: 'Get changed files in PR'
        id: changed-files
        uses: tj-actions/changed-files@v44
        with:
          files: |
            **/*.cls
            **/*.trigger
            **/*.cmp
            **/*.js
            **/*.css
            **/*.html

      - name: 'Debug changed files'
        run: |
          echo "Any changed files: ${{ steps.changed-files.outputs.any_changed }}"
          echo "All changed files: ${{ steps.changed-files.outputs.all_changed_files }}"
          echo "Changed files count: ${{ steps.changed-files.outputs.all_changed_files_count }}"

      - name: 'Run Salesforce Code Analyzer on changed files only'
        if: ${{ steps.changed-files.outputs.any_changed == 'true' }}
        run: |
          echo "Running Code Analyzer on changed files only..."
          
          # Get changed files as string and convert to array
          changed_files="${{ steps.changed-files.outputs.all_changed_files }}"
          echo "Changed files string: $changed_files"
          
          # Convert space-separated string to array
          IFS=' ' read -ra changed_files_array <<< "$changed_files"
          
          echo "Files to analyze:"
          for file in "${changed_files_array[@]}"; do
            echo "  - $file"
          done
          
          # Verify files exist before running analyzer
          existing_files=()
          for file in "${changed_files_array[@]}"; do
            if [ -f "$file" ]; then
              echo "✓ File exists: $file"
              existing_files+=("$file")
            else
              echo "✗ File not found: $file"
            fi
          done
          
          if [ ${#existing_files[@]} -eq 0 ]; then
            echo "No existing files to analyze"
            echo '[]' > sfca_results.json
            exit 0
          fi
          
          echo "Running analyzer on ${#existing_files[@]} files..."
          
          # Run the analyzer (removed --verbose flag)
          sf code-analyzer run --view detail --output-file sfca_results.json --target "${existing_files[@]}"
          
          # Check if output file was created
          if [ -f sfca_results.json ]; then
            echo "✓ sfca_results.json created successfully"
            echo "File size: $(wc -c < sfca_results.json) bytes"
          else
            echo "✗ sfca_results.json was not created"
            # Create empty results to prevent failure
            echo '[]' > sfca_results.json
          fi

      - name: 'Handle case when no changed files detected'
        if: ${{ steps.changed-files.outputs.any_changed != 'true' }}
        run: |
          echo "No changed files detected for analysis"
          echo "This could happen if:"
          echo "  1. Only non-code files were changed"
          echo "  2. The commit doesn't contain the file types we're monitoring"
          echo "  3. This is a push to development without file changes"
          
          # Create empty results file
          echo '[]' > sfca_results.json
          echo "Created empty results file to skip analysis"

      - name: 'Analyze Code Analyzer Results'
        if: always()
        run: |
          echo "=== Salesforce Code Analyzer Results ==="
          
          if [ -f sfca_results.json ]; then
            echo "✓ sfca_results.json found"
            echo "File size: $(wc -c < sfca_results.json) bytes"
            
            # Show first few lines for debugging
            echo "First few lines of results:"
            head -5 sfca_results.json
            
            # Check if the JSON is valid
            if ! jq empty sfca_results.json 2>/dev/null; then
              echo "❌ Invalid JSON format in sfca_results.json"
              echo "Raw content:"
              cat sfca_results.json
              exit 1
            fi
            
            # Check if it's an empty array
            if [ "$(jq 'length' sfca_results.json)" -eq 0 ]; then
              echo "✅ No violations found in analyzed files"
              exit 0
            fi
            
            # Count violations by severity
            violations_summary=$(jq -r '
              def count_violations:
                if type == "array" then
                  map(select(has("violations")) | .violations[])
                elif type == "object" and has("violations") then
                  .violations[]
                elif type == "object" and has("results") then
                  .results[] | select(has("violations")) | .violations[]
                else
                  empty
                end;
              
              [count_violations] | 
              if length == 0 then
                "No violations found"
              else
                group_by(.severity) | 
                map({
                  severity: .[0].severity,
                  count: length
                }) |
                "Violations by severity:\n" + 
                (map("  \(.severity): \(.count)") | join("\n")) +
                "\nTotal violations: \(map(.count) | add)"
              end
            ' sfca_results.json)
            
            echo "$violations_summary"
            
            # Get total violation count
            total_violations=$(jq -r '
              def count_violations:
                if type == "array" then
                  [map(select(has("violations")) | .violations[])] | length
                elif type == "object" and has("violations") then
                  .violations | length
                elif type == "object" and has("results") then
                  [.results[] | select(has("violations")) | .violations[]] | length
                else
                  0
                end;
              count_violations
            ' sfca_results.json)
            
            echo "📈 Total violations found: $total_violations"
            
            if [ "$total_violations" -gt 0 ]; then
              echo ""
              echo "🔍 Detailed Violation Report:"
              echo "================================"
              
              # Display detailed violations
              jq -r '
                def get_violations:
                  if type == "array" then
                    map(select(has("violations")) | .violations[])
                  elif type == "object" and has("violations") then
                    .violations[]
                  elif type == "object" and has("results") then
                    .results[] | select(has("violations")) | .violations[]
                  else
                    empty
                  end;
                
                [get_violations] | 
                group_by(.severity) |
                map(
                  "## \(.[0].severity | ascii_upcase) SEVERITY (\(length) violations)\n" +
                  (map(
                    "### \(.ruleName // "Unknown Rule")\n" +
                    "📁 File: \(.fileName // "Unknown")\n" +
                    "📍 Line: \(.line // "N/A"), Column: \(.column // "N/A")\n" +
                    "💬 Message: \(.message // "No message")\n" +
                    "🔗 URL: \(.url // "No URL")\n"
                  ) | join("\n"))
                ) | join("\n")
              ' sfca_results.json
              
              echo ""
              echo "❌ Code analysis found violations in the changed files."
              echo "Please review and fix the issues above before merging."
              
              # Fail the build for any violations in changed files
              exit 1
            else
              echo "✅ Salesforce Code Analyzer completed with no violations in changed files."
              exit 0
            fi
          else
            echo "❌ No sfca_results.json file found - this shouldn't happen"
            exit 1
          fi
