name: Salesforce Code Analyzer

on:
  pull_request:
    branches:
      - development
    types: [opened, edited, synchronized, reopened]
  push:
    branches:
      - development

jobs:
  salesforce-code-analyzer-scan:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
    steps:
      - name: 'Check out source code'
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # Install Salesforce CLI
      - name: 'Install Salesforce CLI'
        run: npm install -g @salesforce/cli@latest

      # Install Code Analyzer Plugin
      - name: 'Install Salesforce Code Analyzer Plugin'
        run: sf plugins install @salesforce/sfdx-scanner@latest

      # Get changed files
      - name: 'Get changed files in PR'
        id: changed-files
        uses: tj-actions/changed-files@v44
        with:
          files: |
            **/*.cls
            **/*.trigger
            **/*.cmp
            **/*.js
            **/*.css
            **/*.html

      # Run Code Analyzer and filter results
      - name: 'Run Salesforce Code Analyzer'
        if: ${{ steps.changed-files.outputs.any_changed == 'true' }}
        continue-on-error: true
        id: scan-step
        run: |
          # Prepare file list
          changed_files="${{ steps.changed-files.outputs.all_changed_files }}"
          formatted_files=$(echo "$changed_files" | tr ' ' ',')
          
          # Run analyzer with correct syntax
          sf scanner run \
            --target "$formatted_files" \
            --outfile sfca_results_raw.json \
            --format json
          
          if [ -f sfca_results_raw.json ]; then
            echo "scan-completed=true" >> $GITHUB_OUTPUT
            
            # Debug: Show raw JSON structure (console only)
            echo "=== Raw JSON Structure ==="
            jq 'keys' sfca_results_raw.json 2>/dev/null || echo "Not valid JSON or jq failed"
            
            # Filter out NoTrailingWhitespace violations and rebuild JSON
            jq '
              # Handle array of file results and preserve file names
              map(
                . as $file_result |
                if has("violations") then
                  .violations = (.violations | map(
                    select(.ruleName != "NoTrailingWhitespace" and .rule != "NoTrailingWhitespace") |
                    . + {fileName: $file_result.fileName}
                  ))
                else . end
              ) as $filtered_results |
              
              # Calculate total violations after filtering
              ($filtered_results | map(.violations // []) | add // []) as $all_violations |
              
              # Return filtered results with counts
              {
                results: $filtered_results,
                violationCounts: {
                  total: ($all_violations | length),
                  sev1: ($all_violations | map(select(.severity == 1)) | length),
                  sev2: ($all_violations | map(select(.severity == 2)) | length), 
                  sev3: ($all_violations | map(select(.severity == 3)) | length),
                  sev4: ($all_violations | map(select(.severity == 4)) | length),
                  sev5: ($all_violations | map(select(.severity == 5)) | length)
                },
                allViolations: $all_violations
              }
            ' sfca_results_raw.json > sfca_results.json
            
            # Get filtered counts
            total_violations=$(jq '.violationCounts.total' sfca_results.json)
            echo "num-violations=$total_violations" >> $GITHUB_OUTPUT
            
            echo "Total violations after filtering: $total_violations"
            
          else
            echo "scan-completed=false" >> $GITHUB_OUTPUT
            echo "num-violations=0" >> $GITHUB_OUTPUT
          fi

      # Generate custom violation summary
      - name: 'Generate Code Quality Report'
        if: ${{ steps.scan-step.outputs.scan-completed == 'true' }}
        run: |
          echo "# 🔍 Code Quality Analysis Report" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "_NoTrailingWhitespace violations have been excluded from this report._" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
          total_violations=${{ steps.scan-step.outputs.num-violations }}
          
          # Get violation counts
          critical_count=$(jq '.violationCounts.sev1' sfca_results.json)
          high_count=$(jq '.violationCounts.sev2' sfca_results.json)
          medium_count=$(jq '.violationCounts.sev3' sfca_results.json)
          low_count=$(jq '.violationCounts.sev4' sfca_results.json)
          info_count=$(jq '.violationCounts.sev5' sfca_results.json)
          
          # Summary table
          echo "## 📊 Violation Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Severity | Count | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|----------|-------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| 🔴 Critical | $critical_count | $([ $critical_count -eq 0 ] && echo "✅ Pass" || echo "❌ Fail") |" >> $GITHUB_STEP_SUMMARY
          echo "| 🟠 High | $high_count | $([ $high_count -eq 0 ] && echo "✅ Pass" || echo "⚠️ Review") |" >> $GITHUB_STEP_SUMMARY
          echo "| 🟡 Medium | $medium_count | $([ $medium_count -eq 0 ] && echo "✅ Pass" || echo "ℹ️ Consider") |" >> $GITHUB_STEP_SUMMARY
          echo "| 🔵 Low | $low_count | $([ $low_count -eq 0 ] && echo "✅ Pass" || echo "ℹ️ Optional") |" >> $GITHUB_STEP_SUMMARY
          echo "| ⚪ Info | $info_count | $([ $info_count -eq 0 ] && echo "✅ Pass" || echo "ℹ️ Info") |" >> $GITHUB_STEP_SUMMARY
          echo "| **Total** | **$total_violations** | $([ $total_violations -eq 0 ] && echo "✅ **PASS**" || echo "❌ **REVIEW REQUIRED**") |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
          if [ $total_violations -gt 0 ]; then 
            echo "## 🚨 Detailed Violations" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "| Severity | Rule | File | Line | Message | Fix Suggestion |" >> $GITHUB_STEP_SUMMARY
            echo "|----------|------|------|------|---------|----------------|" >> $GITHUB_STEP_SUMMARY

            # Generate clean detailed violations table
            jq -r '
              .allViolations // [] |
              # Remove duplicates based on rule + line + file
              unique_by(.ruleName + (.line // 0 | tostring) + (.fileName // "")) |
              sort_by(.severity, (.fileName // ""), (.line // 0)) |
              map(
                . as $v |
                # Get severity badge
                (if .severity == 1 then "🔴 Critical"
                 elif .severity == 2 then "🟠 High" 
                 elif .severity == 3 then "🟡 Medium"
                 elif .severity == 4 then "🔵 Low"
                 else "⚪ Info" end) as $sev_badge |
                
                # Get rule name
                (.ruleName // .rule // "Unknown") as $rule |
                
                # Clean file name - extract just the filename from full path
                (
                  (.fileName // "Unknown") | 
                  if . == "" or . == null then "Unknown"
                  else 
                    # Split by / and take last part (filename)
                    split("/") | last |
                    # If it contains .cls, .trigger etc, keep it as is
                    # Otherwise show "Unknown"
                    if test("\\.(cls|trigger|cmp|js|css|html)$") then . else "Unknown" end
                  end
                ) as $file |
                
                # Get line number
                (.line // "?") as $line |
                
                # Clean message (truncate if too long and remove newlines)
                (.message // "No message" | 
                 gsub("\\\\n"; " ") | gsub("\\n"; " ") | gsub("\\|"; "/") | 
                 if length > 100 then .[0:97] + "..." else . end) as $msg |
                
                # Generate fix suggestion based on rule
                (if ($rule | test("no-unused-vars"; "i")) then "Remove unused variable or use it"
                 elif ($rule | test("ExcessiveClassLength"; "i")) then "Split class into smaller classes"
                 elif ($rule | test("StdCyclomaticComplexity"; "i")) then "Reduce method complexity"
                 elif ($rule | test("CognitiveComplexity"; "i")) then "Simplify logic and reduce nesting"
                 elif ($rule | test("CyclomaticComplexity"; "i")) then "Reduce method complexity"
                 elif ($rule | test("ApexCRUDViolation"; "i")) then "Add CRUD/FLS checks"
                 elif ($rule | test("AvoidDebugStatements"; "i")) then "Remove debug statements"
                 elif ($rule | test("DebugsShouldUseLoggingLevel"; "i")) then "Add logging level to System.debug"
                 elif ($rule | test("AvoidHardcodingId"; "i")) then "Use Custom Settings"
                 elif ($rule | test("AvoidDmlStatementsInLoops"; "i")) then "Move DML outside loop"
                 elif ($rule | test("AvoidSoqlInLoops"; "i")) then "Move SOQL outside loop"
                 elif ($rule | test("UnusedLocalVariable"; "i")) then "Remove unused variable"
                 elif ($rule | test("EmptyIfStmt"; "i")) then "Add logic or remove"
                 else "Follow Salesforce best practices" end) as $fix |
                
                "| " + $sev_badge + " | `" + $rule + "` | `" + $file + "` | " + ($line|tostring) + " | " + $msg + " | " + $fix + " |"
              ) | .[]
            ' sfca_results.json >> $GITHUB_STEP_SUMMARY 2>/dev/null || {
              echo "| ⚠️ Error | Parse Failed | - | - | Could not parse violation details | Check logs |" >> $GITHUB_STEP_SUMMARY
            }

            echo "" >> $GITHUB_STEP_SUMMARY
            echo "### 💡 Priority Actions" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            
            if [ $critical_count -gt 0 ]; then
              echo "🔴 **Fix Critical Issues First** - These are security/performance blockers" >> $GITHUB_STEP_SUMMARY
            fi
            if [ $high_count -gt 0 ]; then
              echo "🟠 **Review High Priority Issues** - Important for code quality" >> $GITHUB_STEP_SUMMARY  
            fi
            if [ $((medium_count + low_count + info_count)) -gt 0 ]; then
              echo "🟡 **Consider Other Issues** - For better maintainability" >> $GITHUB_STEP_SUMMARY
            fi
            
          else
            echo "## ✅ Excellent Work!" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "🎉 No code quality issues found in your changes!" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "### ✅ All Checks Passed:" >> $GITHUB_STEP_SUMMARY
            echo "- Security best practices" >> $GITHUB_STEP_SUMMARY
            echo "- Performance patterns" >> $GITHUB_STEP_SUMMARY
            echo "- Code style guidelines" >> $GITHUB_STEP_SUMMARY
          fi

      # Build status evaluation
      - name: 'Evaluate Build Status'
        if: ${{ steps.scan-step.outputs.scan-completed == 'true' }}
        run: |
          total_violations=${{ steps.scan-step.outputs.num-violations }}
          critical_count=$(jq '.violationCounts.sev1' sfca_results.json)
          high_count=$(jq '.violationCounts.sev2' sfca_results.json)
          
          echo "🔍 Analysis Results:"
          echo "  Critical: $critical_count | High: $high_count | Total: $total_violations"
          
          if [ $critical_count -gt 0 ]; then
            echo "❌ Build FAILED: Critical issues must be fixed before merging"
            exit 1
          elif [ $high_count -gt 0 ]; then
            echo "⚠️ Build WARNING: High-priority issues found, please review"
            exit 0
          else
            echo "✅ Build PASSED: Code quality standards met"
            exit 0
          fi

      # Handle no files changed
      - name: 'No files to analyze'
        if: ${{ steps.changed-files.outputs.any_changed != 'true' }}
        run: |
          echo "ℹ️ No Salesforce files changed - analysis skipped"
          echo "## ℹ️ No Analysis Required" >> $GITHUB_STEP_SUMMARY
          echo "No Salesforce files were modified in this commit." >> $GITHUB_STEP_SUMMARY