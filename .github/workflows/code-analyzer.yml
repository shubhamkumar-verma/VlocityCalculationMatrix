name: Salesforce Code Analyzer

on:
  pull_request:
    branches:
      - development
    types: [opened, edited, synchronized, reopened]
  push:
    branches:
      - development

jobs:
  salesforce-code-analyzer-scan:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
    steps:
      - name: 'Check out source code'
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # Step 1: Find all changed files and create a list
      - name: 'Get changed files in PR'
        id: changed-files
        uses: tj-actions/changed-files@v44
        with:
          # Match Salesforce file types, like Apex classes, Triggers, and LWC files
          files: |
            **/*.cls
            **/*.trigger
            **/*.cmp
            **/*.js
            **/*.css
            **/*.html

      # Step 2: Debug changed files (optional, can remove in production)
      - name: 'Debug changed files'
        if: ${{ steps.changed-files.outputs.any_changed == 'true' }}
        run: |
          echo "Changed files detected: ${{ steps.changed-files.outputs.any_changed }}"
          echo "Number of changed files: ${{ steps.changed-files.outputs.all_changed_files_count }}"
          echo "Changed files:"
          echo "${{ steps.changed-files.outputs.all_changed_files }}" | tr ' ' '\n'

      # Step 3: Set the list of changed files as the target for the scan
      - name: 'Run Salesforce Code Analyzer on changed files'
        if: ${{ steps.changed-files.outputs.any_changed == 'true' }}
        uses: forcedotcom/run-code-analyzer@v2
        id: scan-step
        with:
          run-arguments: '--view detail --output-file sfca_results.json --target "${{ steps.changed-files.outputs.all_changed_files }}"'

      # Step 4: Display detailed results if violations are found
      - name: 'Display violation details'
        if: ${{ steps.scan-step.outputs.num-violations > 0 }}
        run: |
          echo "=== Salesforce Code Analyzer Results ==="
          echo "📊 Total violations found: ${{ steps.scan-step.outputs.num-violations }}"
          echo "📁 Files analyzed: ${{ steps.changed-files.outputs.all_changed_files_count }}"
          echo ""
          
          if [ -f sfca_results.json ]; then
            echo "🔍 Detailed Violation Report:"
            echo "================================"
            
            # Display violations grouped by severity
            jq -r '
              def get_violations:
                if type == "array" then
                  map(select(has("violations")) | .violations[])
                elif type == "object" and has("violations") then
                  .violations[]
                elif type == "object" and has("results") then
                  .results[] | select(has("violations")) | .violations[]
                else
                  empty
                end;
              
              [get_violations] |
              if length > 0 then
                group_by(.severity) |
                map(
                  "\n## \(.[0].severity | ascii_upcase) SEVERITY (\(length) violations)" +
                  "\n" +
                  (map(
                    "### \(.ruleName // "Unknown Rule")" +
                    "\n📁 **File:** \(.fileName // "Unknown")" +
                    "\n📍 **Location:** Line \(.line // "N/A"), Column \(.column // "N/A")" +
                    "\n💬 **Message:** \(.message // "No message")" +
                    "\n🔗 **More Info:** \(.url // "No URL available")" +
                    "\n---"
                  ) | join("\n"))
                ) | join("\n")
              else
                "No detailed violations available"
              end
            ' sfca_results.json 2>/dev/null || echo "Could not parse violation details from results file"
          else
            echo "⚠️ Results file not found for detailed analysis"
          fi

      # Step 5: Check for violations and fail job if necessary
      - name: 'Check for violations and set job status'
        if: ${{ steps.scan-step.outputs.num-violations > 0 }}
        run: |
          echo ""
          echo "❌ Salesforce Code Analyzer found ${{ steps.scan-step.outputs.num-violations }} violations in the changed files."
          echo "📋 Please review and fix the violations listed above before merging."
          echo ""
          echo "Files that were analyzed:"
          echo "${{ steps.changed-files.outputs.all_changed_files }}" | tr ' ' '\n' | sed 's/^/  - /'
          exit 1

      # Step 6: Success message when no violations found
      - name: 'Success message'
        if: ${{ steps.changed-files.outputs.any_changed == 'true' && steps.scan-step.outputs.num-violations == 0 }}
        run: |
          echo "✅ Salesforce Code Analyzer completed successfully!"
          echo "📊 Files analyzed: ${{ steps.changed-files.outputs.all_changed_files_count }}"
          echo "🎉 No violations found in the changed files."

      # Step 7: Handle case when no files changed
      - name: 'No files to analyze'
        if: ${{ steps.changed-files.outputs.any_changed != 'true' }}
        run: |
          echo "ℹ️ No relevant files were changed in this commit/PR."
          echo "✅ Code analysis skipped - no Salesforce files to analyze."
