name: Salesforce Code Analyzer

on:
  pull_request:
    branches:
      - development
    types: [opened, edited, synchronized, reopened]
  push:
    branches:
      - development

jobs:
  salesforce-code-analyzer-scan:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
    steps:
      - name: 'Check out source code'
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # Install Salesforce CLI
      - name: 'Install Salesforce CLI'
        run: npm install -g @salesforce/cli@latest

      # Install Code Analyzer Plugin
      - name: 'Install Salesforce Code Analyzer Plugin'
        run: sf plugins install code-analyzer@latest

      # Step 1: Find all changed files and create a list
      - name: 'Get changed files in PR'
        id: changed-files
        uses: tj-actions/changed-files@v44
        with:
          files: |
            **/*.cls
            **/*.trigger
            **/*.cmp
            **/*.js
            **/*.css
            **/*.html

      # Step 2: Prepare file list for Code Analyzer
      - name: 'Prepare file list for analysis'
        if: ${{ steps.changed-files.outputs.any_changed == 'true' }}
        id: prepare-files
        run: |
          changed_files="${{ steps.changed-files.outputs.all_changed_files }}"
          formatted_files=$(echo "$changed_files" | tr ' ' ',')
          echo "target-files=$formatted_files" >> $GITHUB_OUTPUT

      # Step 3: Run Code Analyzer with custom output handling
      - name: 'Run Salesforce Code Analyzer on changed files'
        if: ${{ steps.changed-files.outputs.any_changed == 'true' }}
        continue-on-error: true
        id: scan-step
        run: |
          # Run the analyzer directly with sf CLI for more control
          sf code-analyzer run \
            --view detail \
            --output-file sfca_results.json \
            --target "${{ steps.prepare-files.outputs.target-files }}"
          
          # Check if results file exists and count violations
          if [ -f sfca_results.json ]; then
            echo "scan-completed=true" >> $GITHUB_OUTPUT
            
            # Count violations from the array
            total_violations=$(jq '. | length' sfca_results.json 2>/dev/null || echo "0")
            echo "Total violations: $total_violations"
            echo "num-violations=$total_violations" >> $GITHUB_OUTPUT
          else
            echo "scan-completed=false" >> $GITHUB_OUTPUT
            echo "num-violations=0" >> $GITHUB_OUTPUT
          fi

      # Step 4: Custom violation summary and display
      - name: 'Custom Code Quality Report'
        if: ${{ steps.scan-step.outputs.scan-completed == 'true' }}
        run: |
          echo "# 🔍 Code Quality Analysis Report" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
          total_violations=${{ steps.scan-step.outputs.num-violations }}
          
          # Count violations by severity
          critical_count=$(jq '[.[] | select(.severity == 1)] | length' sfca_results.json 2>/dev/null || echo "0")
          high_count=$(jq '[.[] | select(.severity == 2)] | length' sfca_results.json 2>/dev/null || echo "0")
          medium_count=$(jq '[.[] | select(.severity == 3)] | length' sfca_results.json 2>/dev/null || echo "0")
          low_count=$(jq '[.[] | select(.severity == 4)] | length' sfca_results.json 2>/dev/null || echo "0")
          info_count=$(jq '[.[] | select(.severity == 5)] | length' sfca_results.json 2>/dev/null || echo "0")
          
          echo "Violation counts:"
          echo "Critical: $critical_count, High: $high_count, Medium: $medium_count, Low: $low_count, Info: $info_count"
          
          # Summary table
          echo "## 📊 Violation Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Severity | Count | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|----------|-------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| 🔴 Critical | $critical_count | $([ $critical_count -eq 0 ] && echo "✅ Pass" || echo "❌ Fail") |" >> $GITHUB_STEP_SUMMARY
          echo "| 🟠 High | $high_count | $([ $high_count -eq 0 ] && echo "✅ Pass" || echo "⚠️ Review") |" >> $GITHUB_STEP_SUMMARY
          echo "| 🟡 Medium | $medium_count | $([ $medium_count -eq 0 ] && echo "✅ Pass" || echo "ℹ️ Consider") |" >> $GITHUB_STEP_SUMMARY
          echo "| 🔵 Low | $low_count | $([ $low_count -eq 0 ] && echo "✅ Pass" || echo "ℹ️ Optional") |" >> $GITHUB_STEP_SUMMARY
          echo "| ⚪ Info | $info_count | $([ $info_count -eq 0 ] && echo "✅ Pass" || echo "ℹ️ Info") |" >> $GITHUB_STEP_SUMMARY
          echo "| **Total** | **$total_violations** | $([ $total_violations -eq 0 ] && echo "✅ **PASS**" || echo "❌ **REVIEW REQUIRED**") |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
          if [ $total_violations -gt 0 ]; then
            echo "## 🚨 Issues Found" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "The following code quality issues were detected. Issues are grouped by rule for easier review:" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            
            # Group violations by rule and display them nicely
            jq -r '
              # Group violations by rule
              group_by(.rule) | 
              map(
                # Get rule info from first violation in group
                . as $violations | 
                .[0] as $first |
                
                # Create severity emoji
                (if $first.severity == 1 then "🔴 Critical"
                 elif $first.severity == 2 then "🟠 High"
                 elif $first.severity == 3 then "🟡 Medium"
                 elif $first.severity == 4 then "🔵 Low"
                 elif $first.severity == 5 then "⚪ Info"
                 else "❓ Unknown"
                 end) as $severity_badge |
                
                # Create user-friendly rule description
                (if $first.rule == "NoTrailingWhitespace" then "Remove Trailing Whitespace"
                 elif $first.rule == "ApexCRUDViolation" then "Missing CRUD/FLS Security Check"
                 elif $first.rule == "AvoidHardcodingId" then "Avoid Hardcoded Salesforce IDs"
                 elif $first.rule == "MethodNamingConventions" then "Method Naming Convention"
                 elif $first.rule == "ClassNamingConventions" then "Class Naming Convention"
                 elif $first.rule == "VariableNamingConventions" then "Variable Naming Convention"
                 elif $first.rule == "AvoidGlobalModifier" then "Avoid Global Modifier"
                 elif $first.rule == "AvoidDmlStatementsInLoops" then "DML Statements in Loops"
                 elif $first.rule == "AvoidSoqlInLoops" then "SOQL Queries in Loops"
                 elif $first.rule == "CyclomaticComplexity" then "Code Complexity Too High"
                 elif $first.rule == "StdCyclomaticComplexity" then "Method Complexity Too High"
                 elif $first.rule == "TooManyFields" then "Too Many Class Fields"
                 elif $first.rule == "EmptyIfStmt" then "Empty If Statement"
                 elif $first.rule == "EmptyTryOrFinallyBlock" then "Empty Try/Finally Block"
                 elif $first.rule == "UnusedLocalVariable" then "Unused Local Variable"
                 elif $first.rule == "UnnecessaryModifier" then "Unnecessary Access Modifier"
                 else $first.rule
                 end) as $friendly_rule |
                
                # Create solution hint
                (if $first.rule == "NoTrailingWhitespace" then "💡 **How to fix**: Remove extra spaces at the end of lines"
                 elif $first.rule == "ApexCRUDViolation" then "💡 **How to fix**: Add `WITH USER_MODE` to SOQL queries or check permissions with `Schema.sObjectType.Object__c.isAccessible()`"
                 elif $first.rule == "AvoidHardcodingId" then "💡 **How to fix**: Use Custom Settings, Custom Metadata, or dynamic queries instead of hardcoded IDs"
                 elif $first.rule == "AvoidDmlStatementsInLoops" then "💡 **How to fix**: Move DML operations outside loops by collecting records in a list first"
                 elif $first.rule == "AvoidSoqlInLoops" then "💡 **How to fix**: Move SOQL queries outside loops or use Maps for data lookup"
                 elif $first.rule == "CyclomaticComplexity" or $first.rule == "StdCyclomaticComplexity" then "💡 **How to fix**: Break down complex methods into smaller, focused methods"
                 elif $first.rule == "UnusedLocalVariable" then "💡 **How to fix**: Remove unused variables or use them in your code"
                 elif $first.rule == "EmptyIfStmt" then "💡 **How to fix**: Add code to the if block or remove the empty statement"
                 else "💡 **How to fix**: Review the Salesforce coding best practices for this rule"
                 end) as $solution |
                
                # Build the output
                "### " + $severity_badge + " " + $friendly_rule + " (" + (length | tostring) + " occurrence" + (if length > 1 then "s" else "" end) + ")" +
                "\n" +
                "**Issue**: " + $first.message +
                "\n\n" +
                $solution +
                "\n\n" +
                "**Affected locations**:" +
                "\n" +
                (map(
                  "- **" + .locations[0].file + "** at line **" + (.locations[0].startLine | tostring) + "**" +
                  (if .locations[0].startColumn then " (column " + (.locations[0].startColumn | tostring) + ")" else "" end)
                ) | join("\n")) +
                "\n"
              ) | join("\n")
            ' sfca_results.json >> $GITHUB_STEP_SUMMARY 2>/dev/null || echo "Failed to parse violations" >> $GITHUB_STEP_SUMMARY
            
          else
            echo "## ✅ Excellent Work!" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "🎉 No code quality issues found in your changes. Your code meets all quality standards!" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "### What was checked:" >> $GITHUB_STEP_SUMMARY
            echo "- ✅ Code style and formatting" >> $GITHUB_STEP_SUMMARY
            echo "- ✅ Security best practices" >> $GITHUB_STEP_SUMMARY
            echo "- ✅ Performance patterns" >> $GITHUB_STEP_SUMMARY
            echo "- ✅ Salesforce platform guidelines" >> $GITHUB_STEP_SUMMARY
          fi
          
          # Console output with friendly formatting
          echo ""
          echo "════════════════════════════════════════════════════════════════"
          echo "🔍 CODE QUALITY ANALYSIS COMPLETE"
          echo "════════════════════════════════════════════════════════════════"
          echo ""
          echo "📊 SUMMARY:"
          echo "  🔴 Critical: $critical_count"
          echo "  🟠 High:     $high_count"
          echo "  🟡 Medium:   $medium_count"
          echo "  🔵 Low:      $low_count"
          echo "  ⚪ Info:     $info_count"
          echo "  ────────────────"
          echo "  📈 Total:    $total_violations"
          echo ""
          
          if [ $total_violations -gt 0 ]; then
            echo "📋 ISSUES DETECTED:"
            
            # Show a summary of issues by rule
            jq -r '
              group_by(.rule) | 
              map(
                "  • " + 
                (if .[0].severity == 1 then "🔴"
                 elif .[0].severity == 2 then "🟠"
                 elif .[0].severity == 3 then "🟡"
                 elif .[0].severity == 4 then "🔵"
                 else "⚪"
                 end) + 
                " " + .[0].rule + " (" + (length | tostring) + " occurrence" + (if length > 1 then "s" else "" end) + ")"
              ) | join("\n")
            ' sfca_results.json 2>/dev/null || echo "  Failed to parse issue summary"
            
            echo ""
            echo "💡 Check the 'Summary' tab above for detailed fix instructions."
          else
            echo "✅ EXCELLENT: No violations found! Your code is clean. 🎉"
          fi
          echo ""
          echo "════════════════════════════════════════════════════════════════"

      # Step 5: Determine build status
      - name: 'Evaluate Build Status'
        if: ${{ steps.scan-step.outputs.scan-completed == 'true' }}
        run: |
          total_violations=${{ steps.scan-step.outputs.num-violations }}
          
          # Get critical and high severity counts
          critical_count=$(jq '[.[] | select(.severity == 1)] | length' sfca_results.json 2>/dev/null || echo "0")
          high_count=$(jq '[.[] | select(.severity == 2)] | length' sfca_results.json 2>/dev/null || echo "0")
          
          if [ $critical_count -gt 0 ]; then
            echo "🚨 Build FAILED: $critical_count critical security/performance issues found."
            echo "❌ Critical issues must be fixed before merging."
            exit 1
          elif [ $high_count -gt 0 ]; then
            echo "⚠️ Build WARNING: $high_count high-priority issues found."
            echo "🔧 Please review and consider fixing these issues."
            exit 0
          elif [ $total_violations -gt 0 ]; then
            echo "ℹ️ Build PASSED: $total_violations minor code style issues found."
            echo "💡 Consider fixing these for better code quality."
            exit 0
          else
            echo "✅ Build PASSED: No code quality issues found!"
            exit 0
          fi

      # Step 6: Handle case when no files changed
      - name: 'No files to analyze'
        if: ${{ steps.changed-files.outputs.any_changed != 'true' }}
        run: |
          echo "ℹ️ No relevant files were changed in this commit/PR."
          echo "✅ Code analysis skipped - no Salesforce files to analyze."