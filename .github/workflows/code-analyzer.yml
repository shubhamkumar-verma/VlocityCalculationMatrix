name: Salesforce Code Analyzer

on:
  pull_request:
    branches:
      - development
    types: [opened, edited, synchronized, reopened]
  push:
    branches:
      - development

jobs:
  salesforce-code-analyzer-scan:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
    steps:
      - name: 'Check out source code'
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Salesforce CLI
        run: npm install -g @salesforce/cli@latest

      - name: Install Code Analyzer Plugin
        run: sf plugins install code-analyzer@latest

      - name: 'Get changed files in PR'
        id: changed-files
        uses: tj-actions/changed-files@v44
        with:
          files: |
            **/*.cls
            **/*.trigger
            **/*.cmp
            **/*.js
            **/*.css
            **/*.html

      - name: 'Debug changed files'
        run: |
          echo "Any changed files: ${{ steps.changed-files.outputs.any_changed }}"
          echo "All changed files: ${{ steps.changed-files.outputs.all_changed_files }}"
          echo "Changed files count: ${{ steps.changed-files.outputs.all_changed_files_count }}"

      - name: 'Run Salesforce Code Analyzer on changed files only'
        if: ${{ steps.changed-files.outputs.any_changed == 'true' }}
        run: |
          echo "Running Code Analyzer on changed files only..."
          
          # Get changed files as string and convert to array
          changed_files="${{ steps.changed-files.outputs.all_changed_files }}"
          echo "Changed files string: $changed_files"
          
          # Convert space-separated string to array
          IFS=' ' read -ra changed_files_array <<< "$changed_files"
          
          echo "Files to analyze:"
          for file in "${changed_files_array[@]}"; do
            echo "  - $file"
          done
          
          # Verify files exist before running analyzer
          existing_files=()
          for file in "${changed_files_array[@]}"; do
            if [ -f "$file" ]; then
              echo "✓ File exists: $file"
              existing_files+=("$file")
            else
              echo "✗ File not found: $file"
            fi
          done
          
          if [ ${#existing_files[@]} -eq 0 ]; then
            echo "No existing files to analyze"
            echo '[]' > sfca_results.json
            exit 0
          fi
          
          echo "Running analyzer on ${#existing_files[@]} files..."
          
          # Run the analyzer
          sf code-analyzer run --view detail --output-file sfca_results.json --target "${existing_files[@]}"
          
          # Check if output file was created
          if [ -f sfca_results.json ]; then
            echo "✓ sfca_results.json created successfully"
            echo "File size: $(wc -c < sfca_results.json) bytes"
          else
            echo "✗ sfca_results.json was not created"
            # Create empty results to prevent failure
            echo '[]' > sfca_results.json
          fi

      - name: 'Handle case when no changed files detected'
        if: ${{ steps.changed-files.outputs.any_changed != 'true' }}
        run: |
          echo "No changed files detected for analysis"
          echo "This could happen if:"
          echo "  1. Only non-code files were changed"
          echo "  2. The commit doesn't contain the file types we're monitoring"
          echo "  3. This is a push to development without file changes"
          
          # Create empty results file
          echo '[]' > sfca_results.json
          echo "Created empty results file to skip analysis"

      - name: 'Analyze Code Analyzer Results'
        if: always()
        run: |
          echo "=== Salesforce Code Analyzer Results ==="
          
          if [ -f sfca_results.json ]; then
            echo "✓ sfca_results.json found"
            echo "File size: $(wc -c < sfca_results.json) bytes"
            
            # Show the actual content for debugging
            echo "=== FILE CONTENT START ==="
            cat sfca_results.json
            echo "=== FILE CONTENT END ==="
            
            # Check if the JSON is valid first
            if ! jq empty sfca_results.json 2>/dev/null; then
              echo "❌ Invalid JSON format in sfca_results.json"
              echo "Trying to fix JSON or handle as text..."
              exit 1
            fi
            
            # Check the JSON type
            json_type=$(jq -r 'type' sfca_results.json)
            echo "JSON type: $json_type"
            
            # Simple length check for arrays
            if [ "$json_type" = "array" ]; then
              length=$(jq 'length' sfca_results.json)
              echo "Array length: $length"
              
              if [ "$length" -eq 0 ]; then
                echo "✅ No violations found in analyzed files"
                exit 0
              fi
              
              # Count violations in a simpler way
              violation_count=0
              
              # Check if any elements have violations
              has_violations=$(jq -r 'map(select(has("violations"))) | length' sfca_results.json 2>/dev/null || echo "0")
              
              if [ "$has_violations" -gt 0 ]; then
                # Count total violations
                violation_count=$(jq -r '[.[] | select(has("violations")) | .violations[]] | length' sfca_results.json 2>/dev/null || echo "0")
                
                echo "📈 Total violations found: $violation_count"
                
                if [ "$violation_count" -gt 0 ]; then
                  echo ""
                  echo "🔍 Violation Details:"
                  echo "====================="
                  
                  # Simple violation display
                  jq -r '.[] | select(has("violations")) | .violations[] | "File: \(.fileName // "Unknown")\nLine: \(.line // "N/A")\nRule: \(.ruleName // "Unknown")\nMessage: \(.message // "No message")\nSeverity: \(.severity // "Unknown")\n---"' sfca_results.json 2>/dev/null || echo "Could not parse violations"
                  
                  echo ""
                  echo "❌ Code analysis found violations in the changed files."
                  exit 1
                else
                  echo "✅ No violations found in changed files."
                  exit 0
                fi
              else
                echo "✅ No violations found in analyzed files"
                exit 0
              fi
              
            elif [ "$json_type" = "object" ]; then
              echo "JSON is an object, checking for results or violations..."
              
              # Handle object format
              has_results=$(jq -r 'has("results")' sfca_results.json 2>/dev/null || echo "false")
              has_violations=$(jq -r 'has("violations")' sfca_results.json 2>/dev/null || echo "false")
              
              if [ "$has_results" = "true" ]; then
                violation_count=$(jq -r '.results | length' sfca_results.json 2>/dev/null || echo "0")
              elif [ "$has_violations" = "true" ]; then
                violation_count=$(jq -r '.violations | length' sfca_results.json 2>/dev/null || echo "0")
              else
                violation_count=0
              fi
              
              echo "📈 Total violations found: $violation_count"
              
              if [ "$violation_count" -gt 0 ]; then
                echo "❌ Code analysis found violations in the changed files."
                echo "Raw violations:"
                jq -r '.' sfca_results.json
                exit 1
              else
                echo "✅ No violations found in changed files."
                exit 0
              fi
              
            else
              echo "⚠️ Unexpected JSON format: $json_type"
              echo "Content:"
              jq -r '.' sfca_results.json
              exit 0
            fi
            
          else
            echo "❌ No sfca_results.json file found - this shouldn't happen"
            exit 1
          fi
