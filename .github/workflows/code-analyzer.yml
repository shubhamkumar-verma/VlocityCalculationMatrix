name: Salesforce Code Analyzer

on:
  pull_request:
    branches:
      - development
    types: [opened, edited, synchronized, reopened]
  push:
    branches:
      - development

jobs:
  salesforce-code-analyzer-scan:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
    steps:
      - name: 'Check out source code'
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # Step 1: Install Salesforce CLI
      - name: Install Salesforce CLI
        run: npm install -g @salesforce/cli@latest

      # Step 2: Install Salesforce Code Analyzer Plugin
      - name: Install Code Analyzer Plugin
        run: sf plugins install code-analyzer@latest

      # Step 3: Find all changed files and format the list
      - name: 'Get changed files in PR'
        id: changed-files
        uses: tj-actions/changed-files@v44
        with:
          files: |
            **/*.cls
            **/*.trigger
            **/*.cmp
            **/*.js
            **/*.css
            **/*.html

      # Step 4: Run Salesforce Code Analyzer on changed files
      - name: 'Run Salesforce Code Analyzer on changed files'
        if: ${{ steps.changed-files.outputs.any_changed == 'true' }}
        run: |
          # Split the space-separated list into a bash array
          changed_files_array=(${{ steps.changed-files.outputs.all_changed_files }})
          # Pass the array of files correctly to the --target argument
          sf code-analyzer run --view detail --output-file sfca_results.json --target "${changed_files_array[@]}"

      # Step 5: Check for violations and set job status
      - name: 'Check for violations and set job status'
        if: ${{ steps.scan-step.outputs.num-violations > 0 }}
        run: |
          echo "Salesforce Code Analyzer found ${{ steps.scan-step.outputs.num-violations }} violations."
          exit 1
