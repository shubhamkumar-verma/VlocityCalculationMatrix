name: Salesforce Code Analyzer

on:
  pull_request:
    branches:
      - development
    types: [opened, edited, synchronized, reopened]
  push:
    branches:
      - development

jobs:
  salesforce-code-analyzer-scan:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
    steps:
      - name: 'Check out source code'
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Salesforce CLI
        run: npm install -g @salesforce/cli@latest

      - name: Install Code Analyzer Plugin
        run: sf plugins install code-analyzer@latest

      - name: 'Get changed files in PR'
        id: changed-files
        uses: tj-actions/changed-files@v44
        with:
          files: |
            **/*.cls
            **/*.trigger
            **/*.cmp
            **/*.js
            **/*.css
            **/*.html

      - name: 'Run Salesforce Code Analyzer on changed files'
        if: ${{ steps.changed-files.outputs.any_changed == 'true' }}
        run: |
          changed_files_array=(${{ steps.changed-files.outputs.all_changed_files }})
          sf code-analyzer run --view detail --output-file sfca_results.json --target "${changed_files_array[@]}"

      - name: 'Check for violations and set job status'
        if: always()
        run: |
          if [ -f sfca_results.json ]; then
            echo "Analyzing JSON structure..."
            # First, let's see the structure of the JSON file
            echo "First 20 lines of results:"
            head -20 sfca_results.json
            
            # Check if the JSON is valid
            if ! jq empty sfca_results.json 2>/dev/null; then
              echo "Invalid JSON format in sfca_results.json"
              exit 1
            fi
            
            # Try to determine the actual structure and count violations
            violations=$(jq -r '
              if type == "array" then
                map(select(has("violations")) | .violations | length) | add // 0
              elif type == "object" and has("violations") then
                .violations | length
              elif type == "object" and has("results") then
                .results | map(select(has("violations")) | .violations | length) | add // 0
              else
                0
              end
            ' sfca_results.json)
            
            echo "Total violations found: $violations"
            
            if [ "$violations" -gt 0 ]; then
              echo "Salesforce Code Analyzer found $violations violations."
              # Display violation details
              jq -r '
                if type == "array" then
                  .[] | select(has("violations")) | .violations[]?
                elif type == "object" and has("violations") then
                  .violations[]?
                elif type == "object" and has("results") then
                  .results[] | select(has("violations")) | .violations[]?
                else
                  empty
                end
              ' sfca_results.json || echo "Could not extract violation details"
              exit 1
            fi
          fi
          echo "Salesforce Code Analyzer completed with no violations."
