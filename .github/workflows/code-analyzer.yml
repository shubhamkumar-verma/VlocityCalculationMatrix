name: Salesforce Code Analyzer

on:
  pull_request:
    branches:
      - development
    types: [opened, edited, synchronized, reopened]
  push:
    branches:
      - development

jobs:
  salesforce-code-analyzer-scan:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
    steps:
      - name: 'Check out source code'
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # Install Salesforce CLI
      - name: 'Install Salesforce CLI'
        run: npm install -g @salesforce/cli@latest

      # Install Code Analyzer Plugin
      - name: 'Install Salesforce Code Analyzer Plugin'
        run: sf plugins install code-analyzer@latest

      # Step 1: Find all changed files and create a list
      - name: 'Get changed files in PR'
        id: changed-files
        uses: tj-actions/changed-files@v44
        with:
          files: |
            **/*.cls
            **/*.trigger
            **/*.cmp
            **/*.js
            **/*.css
            **/*.html

      # Step 2: Prepare file list for Code Analyzer
      - name: 'Prepare file list for analysis'
        if: ${{ steps.changed-files.outputs.any_changed == 'true' }}
        id: prepare-files
        run: |
          changed_files="${{ steps.changed-files.outputs.all_changed_files }}"
          formatted_files=$(echo "$changed_files" | tr ' ' ',')
          echo "target-files=$formatted_files" >> $GITHUB_OUTPUT

      # Step 3: Run Code Analyzer with custom output handling
      - name: 'Run Salesforce Code Analyzer on changed files'
        if: ${{ steps.changed-files.outputs.any_changed == 'true' }}
        continue-on-error: true
        id: scan-step
        run: |
          # Run the analyzer directly with sf CLI for more control
          sf code-analyzer run \
            --view detail \
            --output-file sfca_results.json \
            --target "${{ steps.prepare-files.outputs.target-files }}"
          
          # Check if results file exists and count violations
          if [ -f sfca_results.json ]; then
            echo "scan-completed=true" >> $GITHUB_OUTPUT
            
            echo "=== COMPLETE JSON FILE DEBUG ==="
            echo "File exists: Yes"
            echo "File size: $(wc -c < sfca_results.json) bytes"
            echo "First 20 lines of JSON:"
            head -20 sfca_results.json
            echo ""
            echo "Last 10 lines of JSON:"
            tail -10 sfca_results.json
            echo ""
            echo "JSON validation:"
            if jq empty sfca_results.json 2>/dev/null; then
              echo "✅ Valid JSON"
            else
              echo "❌ Invalid JSON"
              echo "JSON parsing error:"
              jq empty sfca_results.json 2>&1 || true
            fi
            echo "=== END COMPLETE DEBUG ==="
            
            # Count violations from the array
            total_violations=$(jq '. | length' sfca_results.json 2>/dev/null || echo "0")
            echo "Total violations: $total_violations"
            echo "num-violations=$total_violations" >> $GITHUB_OUTPUT
          else
            echo "scan-completed=false" >> $GITHUB_OUTPUT
            echo "num-violations=0" >> $GITHUB_OUTPUT
            echo "❌ Results file not found!"
          fi

      # Step 4: Custom violation summary and display
      - name: 'Custom Code Quality Report'
        if: ${{ steps.scan-step.outputs.scan-completed == 'true' }}
        run: |
          echo "# 🔍 Code Quality Analysis Report" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
          total_violations=${{ steps.scan-step.outputs.num-violations }}
          
          # More comprehensive debugging
          echo "=== COMPREHENSIVE JSON ANALYSIS ==="
          
          # Check if jq is working at all
          echo "Testing jq basic functionality:"
          echo '{"test": "value"}' | jq '.test' || echo "jq command failed"
          
          # Check JSON file accessibility
          echo "Checking JSON file:"
          if [ -f sfca_results.json ]; then
            echo "✅ File exists"
            echo "File permissions: $(ls -la sfca_results.json)"
            
            # Try different jq approaches
            echo "Testing different jq queries:"
            
            echo "1. Basic type check:"
            jq 'type' sfca_results.json 2>&1 || echo "Failed"
            
            echo "2. Basic length check:"
            jq 'length' sfca_results.json 2>&1 || echo "Failed"
            
            echo "3. Keys if object:"
            jq 'keys?' sfca_results.json 2>&1 || echo "Failed or not object"
            
            echo "4. First element:"
            jq '.[0]?' sfca_results.json 2>&1 || echo "Failed"
            
            echo "5. First element type:"
            jq '.[0] | type?' sfca_results.json 2>&1 || echo "Failed"
            
            echo "6. All severity values:"
            jq '.[].severity?' sfca_results.json 2>&1 || echo "Failed"
            
            echo "7. Manual severity check:"
            jq '.[] | .severity' sfca_results.json 2>&1 || echo "Failed"
            
          else
            echo "❌ File does not exist"
          fi
          echo "=== END COMPREHENSIVE ANALYSIS ==="
          
          # Initialize counts
          critical_count=0
          high_count=0
          medium_count=0
          low_count=0
          info_count=0
          
          # Try manual parsing if jq is working
          if [ -f sfca_results.json ] && jq empty sfca_results.json 2>/dev/null; then
            echo "Attempting manual severity counting..."
            
            # Try to extract and count severities manually
            severity_list=$(jq -r '.[].severity' sfca_results.json 2>/dev/null || echo "")
            if [ -n "$severity_list" ]; then
              echo "Found severity values: $severity_list"
              
              # Count each severity manually
              for severity in $severity_list; do
                case $severity in
                  1) critical_count=$((critical_count + 1)) ;;
                  2) high_count=$((high_count + 1)) ;;
                  3) medium_count=$((medium_count + 1)) ;;
                  4) low_count=$((low_count + 1)) ;;
                  5) info_count=$((info_count + 1)) ;;
                esac
              done
            fi
          fi
          
          echo "Manual violation counts:"
          echo "Critical: $critical_count, High: $high_count, Medium: $medium_count, Low: $low_count, Info: $info_count"
          
          # Summary table
          echo "## 📊 Violation Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Severity | Count | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|----------|-------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| 🔴 Critical | $critical_count | $([ $critical_count -eq 0 ] && echo "✅ Pass" || echo "❌ Fail") |" >> $GITHUB_STEP_SUMMARY
          echo "| 🟠 High | $high_count | $([ $high_count -eq 0 ] && echo "✅ Pass" || echo "⚠️ Review") |" >> $GITHUB_STEP_SUMMARY
          echo "| 🟡 Medium | $medium_count | $([ $medium_count -eq 0 ] && echo "✅ Pass" || echo "ℹ️ Consider") |" >> $GITHUB_STEP_SUMMARY
          echo "| 🔵 Low | $low_count | $([ $low_count -eq 0 ] && echo "✅ Pass" || echo "ℹ️ Optional") |" >> $GITHUB_STEP_SUMMARY
          echo "| ⚪ Info | $info_count | $([ $info_count -eq 0 ] && echo "✅ Pass" || echo "ℹ️ Info") |" >> $GITHUB_STEP_SUMMARY
          echo "| **Total** | **$total_violations** | $([ $total_violations -eq 0 ] && echo "✅ **PASS**" || echo "❌ **REVIEW REQUIRED**") |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
          if [ $total_violations -gt 0 ]; then
            echo "## 🚨 Issues Found" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "The following code quality issues were detected:" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            
            # Show complete JSON for debugging
            echo "### 🔍 Complete JSON Output" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo '```json' >> $GITHUB_STEP_SUMMARY
            cat sfca_results.json >> $GITHUB_STEP_SUMMARY 2>/dev/null || echo "Failed to display JSON file" >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            
            # Try simple violation extraction
            echo "### 📋 Violation Details (Simple Parse)" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            
            # Process violations one by one
            violation_count=0
            while [ $violation_count -lt $total_violations ]; do
              echo "Processing violation $((violation_count + 1))..."
              
              violation_rule=$(jq -r ".[$violation_count].rule // \"Unknown\"" sfca_results.json 2>/dev/null || echo "Unknown")
              violation_message=$(jq -r ".[$violation_count].message // \"No message\"" sfca_results.json 2>/dev/null || echo "No message")
              violation_file=$(jq -r ".[$violation_count].locations[0].file // \"Unknown\"" sfca_results.json 2>/dev/null || echo "Unknown")
              violation_line=$(jq -r ".[$violation_count].locations[0].startLine // \"?\"" sfca_results.json 2>/dev/null || echo "?")
              violation_severity=$(jq -r ".[$violation_count].severity // \"?\"" sfca_results.json 2>/dev/null || echo "?")
              
              # Add to summary
              echo "**Violation $((violation_count + 1)): $violation_rule**" >> $GITHUB_STEP_SUMMARY
              echo "- **File**: $violation_file" >> $GITHUB_STEP_SUMMARY
              echo "- **Line**: $violation_line" >> $GITHUB_STEP_SUMMARY
              echo "- **Severity**: $violation_severity" >> $GITHUB_STEP_SUMMARY
              echo "- **Message**: $violation_message" >> $GITHUB_STEP_SUMMARY
              echo "" >> $GITHUB_STEP_SUMMARY
              
              violation_count=$((violation_count + 1))
            done
            
          else
            echo "## ✅ Excellent Work!" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "🎉 No code quality issues found in your changes." >> $GITHUB_STEP_SUMMARY
          fi
          
          # Console output
          echo ""
          echo "════════════════════════════════════════════════════════════════"
          echo "🔍 CODE QUALITY ANALYSIS COMPLETE"
          echo "════════════════════════════════════════════════════════════════"
          echo ""
          echo "📊 SUMMARY:"
          echo "  🔴 Critical: $critical_count"
          echo "  🟠 High:     $high_count"
          echo "  🟡 Medium:   $medium_count"
          echo "  🔵 Low:      $low_count"
          echo "  ⚪ Info:     $info_count"
          echo "  ────────────────"
          echo "  📈 Total:    $total_violations"
          echo ""
          
          if [ $total_violations -gt 0 ]; then
            echo "📋 ISSUES DETECTED:"
            echo "  Check the Summary tab for detailed violation information."
          else
            echo "✅ EXCELLENT: No violations found!"
          fi
          echo ""
          echo "════════════════════════════════════════════════════════════════"

      # Step 5: Determine build status
      - name: 'Evaluate Build Status'
        if: ${{ steps.scan-step.outputs.scan-completed == 'true' }}
        run: |
          total_violations=${{ steps.scan-step.outputs.num-violations }}
          
          if [ $total_violations -gt 0 ]; then
            echo "ℹ️ Build PASSED: $total_violations code style issues found."
            echo "💡 Consider fixing these for better code quality."
            exit 0
          else
            echo "✅ Build PASSED: No code quality issues found!"
            exit 0
          fi

      # Step 6: Handle case when no files changed
      - name: 'No files to analyze'
        if: ${{ steps.changed-files.outputs.any_changed != 'true' }}
        run: |
          echo "ℹ️ No relevant files were changed in this commit/PR."
          echo "✅ Code analysis skipped - no Salesforce files to analyze."