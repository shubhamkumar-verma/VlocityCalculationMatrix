name: Salesforce Code Analyzer

on:
  pull_request:
    branches:
      - development
    types: [opened, edited, synchronized, reopened]
  push:
    branches:
      - development

jobs:
  salesforce-code-analyzer-scan:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
    steps:
      - name: 'Check out source code'
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # Install Salesforce CLI
      - name: 'Install Salesforce CLI'
        run: npm install -g @salesforce/cli@latest

      # Install Code Analyzer Plugin
      - name: 'Install Salesforce Code Analyzer Plugin'
        run: sf plugins install code-analyzer@latest

      # Step 1: Find all changed files and create a list
      - name: 'Get changed files in PR'
        id: changed-files
        uses: tj-actions/changed-files@v44
        with:
          # Match Salesforce file types, like Apex classes, Triggers, and LWC files
          files: |
            **/*.cls
            **/*.trigger
            **/*.cmp
            **/*.js
            **/*.css
            **/*.html

      # Step 2: Prepare file list for Code Analyzer
      - name: 'Prepare file list for analysis'
        if: ${{ steps.changed-files.outputs.any_changed == 'true' }}
        id: prepare-files
        run: |
          # Convert space-separated files to comma-separated format
          changed_files="${{ steps.changed-files.outputs.all_changed_files }}"
          
          # Replace spaces with commas for the Code Analyzer
          formatted_files=$(echo "$changed_files" | tr ' ' ',')
          
          echo "target-files=$formatted_files" >> $GITHUB_OUTPUT

      # Step 3: Run Code Analyzer with custom output handling
      - name: 'Run Salesforce Code Analyzer on changed files'
        if: ${{ steps.changed-files.outputs.any_changed == 'true' }}
        continue-on-error: true
        id: scan-step
        run: |
          # Run the analyzer directly with sf CLI for more control
          sf code-analyzer run \
            --view detail \
            --output-file sfca_results.json \
            --target "${{ steps.prepare-files.outputs.target-files }}"
          
          # Check if results file exists and debug its content
          if [ -f sfca_results.json ]; then
            echo "scan-completed=true" >> $GITHUB_OUTPUT
            
            echo "=== DEBUG: JSON Structure ==="
            echo "JSON type: $(jq -r 'type' sfca_results.json)"
            echo "JSON length: $(jq -r 'length' sfca_results.json)"
            echo "First few lines of JSON:"
            head -20 sfca_results.json
            echo "=== END DEBUG ==="
            
            # Count total violations with better logic
            total_violations=$(jq -r '
              if type == "array" then
                [.[] | select(has("violations")) | .violations[]] | length
              elif type == "object" then
                if has("violations") then
                  .violations | length
                elif has("results") then
                  [.results[] | select(has("violations")) | .violations[]] | length
                else
                  0
                end
              else
                0
              end
            ' sfca_results.json 2>/dev/null || echo "0")
            
            echo "Total violations counted: $total_violations"
            echo "num-violations=$total_violations" >> $GITHUB_OUTPUT
          else
            echo "scan-completed=false" >> $GITHUB_OUTPUT
            echo "num-violations=0" >> $GITHUB_OUTPUT
          fi

      # Step 4: Custom violation summary and display
      - name: 'Custom Code Quality Report'
        if: ${{ steps.scan-step.outputs.scan-completed == 'true' }}
        run: |
          echo "# 🔍 Code Quality Analysis Report" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
          # Debug the JSON structure first
          echo "=== DEBUGGING JSON STRUCTURE ==="
          echo "JSON file exists: $([ -f sfca_results.json ] && echo "Yes" || echo "No")"
          if [ -f sfca_results.json ]; then
            echo "JSON type: $(jq -r 'type' sfca_results.json)"
            echo "JSON keys (if object): $(jq -r 'keys?' sfca_results.json 2>/dev/null || echo "Not an object")"
            echo "Sample violation structure:"
            jq -r '
              if type == "array" then
                .[0] | if has("violations") then .violations[0] else "No violations in first element" end
              elif type == "object" then
                if has("violations") then .violations[0] else if has("results") then .results[0] else "Unknown structure" end end
              else
                "Unknown type"
              end
            ' sfca_results.json 2>/dev/null || echo "Failed to parse"
          fi
          echo "=== END DEBUG ==="
          
          # Get violation counts by severity with improved logic
          critical_count=$(jq -r '
            def get_violations:
              if type == "array" then
                [.[] | select(has("violations")) | .violations[]]
              elif type == "object" and has("violations") then
                .violations
              elif type == "object" and has("results") then
                [.results[] | select(has("violations")) | .violations[]]
              else
                []
              end;
            [get_violations[] | select(.severity == 1 or .severity == "1")] | length
          ' sfca_results.json 2>/dev/null || echo "0")
          
          high_count=$(jq -r '
            def get_violations:
              if type == "array" then
                [.[] | select(has("violations")) | .violations[]]
              elif type == "object" and has("violations") then
                .violations
              elif type == "object" and has("results") then
                [.results[] | select(has("violations")) | .violations[]]
              else
                []
              end;
            [get_violations[] | select(.severity == 2 or .severity == "2")] | length
          ' sfca_results.json 2>/dev/null || echo "0")
          
          medium_count=$(jq -r '
            def get_violations:
              if type == "array" then
                [.[] | select(has("violations")) | .violations[]]
              elif type == "object" and has("violations") then
                .violations
              elif type == "object" and has("results") then
                [.results[] | select(has("violations")) | .violations[]]
              else
                []
              end;
            [get_violations[] | select(.severity == 3 or .severity == "3")] | length
          ' sfca_results.json 2>/dev/null || echo "0")
          
          low_count=$(jq -r '
            def get_violations:
              if type == "array" then
                [.[] | select(has("violations")) | .violations[]]
              elif type == "object" and has("violations") then
                .violations
              elif type == "object" and has("results") then
                [.results[] | select(has("violations")) | .violations[]]
              else
                []
              end;
            [get_violations[] | select(.severity == 4 or .severity == "4")] | length
          ' sfca_results.json 2>/dev/null || echo "0")
          
          info_count=$(jq -r '
            def get_violations:
              if type == "array" then
                [.[] | select(has("violations")) | .violations[]]
              elif type == "object" and has("violations") then
                .violations
              elif type == "object" and has("results") then
                [.results[] | select(has("violations")) | .violations[]]
              else
                []
              end;
            [get_violations[] | select(.severity == 5 or .severity == "5")] | length
          ' sfca_results.json 2>/dev/null || echo "0")
          
          total_violations=${{ steps.scan-step.outputs.num-violations }}
          
          echo "=== VIOLATION COUNTS ==="
          echo "Critical: $critical_count"
          echo "High: $high_count" 
          echo "Medium: $medium_count"
          echo "Low: $low_count"
          echo "Info: $info_count"
          echo "Total: $total_violations"
          echo "=== END COUNTS ==="
          
          # Summary table
          echo "## 📊 Violation Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Severity | Count | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|----------|-------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| 🔴 Critical | $critical_count | $([ $critical_count -eq 0 ] && echo "✅ Pass" || echo "❌ Fail") |" >> $GITHUB_STEP_SUMMARY
          echo "| 🟠 High | $high_count | $([ $high_count -eq 0 ] && echo "✅ Pass" || echo "⚠️ Review") |" >> $GITHUB_STEP_SUMMARY
          echo "| 🟡 Medium | $medium_count | $([ $medium_count -eq 0 ] && echo "✅ Pass" || echo "ℹ️ Consider") |" >> $GITHUB_STEP_SUMMARY
          echo "| 🔵 Low | $low_count | $([ $low_count -eq 0 ] && echo "✅ Pass" || echo "ℹ️ Optional") |" >> $GITHUB_STEP_SUMMARY
          echo "| ⚪ Info | $info_count | $([ $info_count -eq 0 ] && echo "✅ Pass" || echo "ℹ️ Info") |" >> $GITHUB_STEP_SUMMARY
          echo "| **Total** | **$total_violations** | $([ $total_violations -eq 0 ] && echo "✅ **PASS**" || echo "❌ **REVIEW REQUIRED**") |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
          if [ $total_violations -gt 0 ]; then
            echo "## 🚨 Issues Found" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "The following issues were detected in your code changes:" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            
            # Show all violations with improved parsing
            echo "### 📋 All Violations" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            jq -r '
              def get_violations:
                if type == "array" then
                  [.[] | select(has("violations")) | .violations[]]
                elif type == "object" and has("violations") then
                  .violations
                elif type == "object" and has("results") then
                  [.results[] | select(has("violations")) | .violations[]]
                else
                  []
                end;
              
              get_violations[] | 
              "- **" + (.fileName // "Unknown File") + "** (Line " + (.line // "?" | tostring) + ")" +
              "\n  - **Rule**: `" + (.ruleName // "Unknown") + "`" +
              "\n  - **Severity**: " + (
                if .severity == 1 or .severity == "1" then "🔴 Critical"
                elif .severity == 2 or .severity == "2" then "🟠 High"  
                elif .severity == 3 or .severity == "3" then "🟡 Medium"
                elif .severity == 4 or .severity == "4" then "🔵 Low"
                elif .severity == 5 or .severity == "5" then "⚪ Info"
                else "❓ Unknown (" + (.severity | tostring) + ")"
                end
              ) +
              "\n  - **Message**: " + (.message // "No description") +
              (if .url then "\n  - **[Learn More](" + .url + ")**" else "" end) +
              "\n"
            ' sfca_results.json >> $GITHUB_STEP_SUMMARY 2>/dev/null || echo "Failed to parse violations for summary" >> $GITHUB_STEP_SUMMARY
          else
            echo "## ✅ Great Job!" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "No code quality issues found in your changes. Your code meets all quality standards! 🎉" >> $GITHUB_STEP_SUMMARY
          fi
          
          # Console output with custom formatting
          echo ""
          echo "════════════════════════════════════════════════════════════════"
          echo "🔍 SALESFORCE CODE QUALITY ANALYSIS COMPLETE"
          echo "════════════════════════════════════════════════════════════════"
          echo ""
          echo "📊 SUMMARY:"
          echo "  🔴 Critical: $critical_count"
          echo "  🟠 High:     $high_count"
          echo "  🟡 Medium:   $medium_count"
          echo "  🔵 Low:      $low_count"
          echo "  ⚪ Info:     $info_count"
          echo "  ────────────────"
          echo "  📈 Total:    $total_violations"
          echo ""
          
          if [ $total_violations -gt 0 ]; then
            echo "❌ ACTION REQUIRED: Please review and address the issues above."
            echo "📋 Check the 'Summary' tab for detailed violation information."
          else
            echo "✅ EXCELLENT: No violations found! Your code is clean. 🎉"
          fi
          echo ""
          echo "════════════════════════════════════════════════════════════════"

      # Step 5: Determine build status
      - name: 'Evaluate Build Status'
        if: ${{ steps.scan-step.outputs.scan-completed == 'true' }}
        run: |
          total_violations=${{ steps.scan-step.outputs.num-violations }}
          
          if [ $total_violations -gt 0 ]; then
            echo "⚠️ Build completed with $total_violations violations detected."
            echo "💡 Please review the violations in the Summary tab."
            echo "🔧 Consider fixing high and critical severity issues before merging."
            # Don't fail the build, just warn
            exit 0
          else
            echo "✅ Build passed with no violations!"
            exit 0
          fi

      # Step 6: Handle case when no files changed
      - name: 'No files to analyze'
        if: ${{ steps.changed-files.outputs.any_changed != 'true' }}
        run: |
          echo "ℹ️ No relevant files were changed in this commit/PR."
          echo "✅ Code analysis skipped - no Salesforce files to analyze."
