name: Salesforce Code Analyzer

on:
  pull_request:
    branches:
      - development
    types: [opened, edited, synchronized, reopened]
  push:
    branches:
      - development

jobs:
  salesforce-code-analyzer-scan:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
    steps:
      - name: 'Check out source code'
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # Install Salesforce CLI
      - name: 'Install Salesforce CLI'
        run: npm install -g @salesforce/cli@latest

      # Install Code Analyzer Plugin
      - name: 'Install Salesforce Code Analyzer Plugin'
        run: sf plugins install code-analyzer@latest

      # Step 1: Find all changed files and create a list
      - name: 'Get changed files in PR'
        id: changed-files
        uses: tj-actions/changed-files@v44
        with:
          # Match Salesforce file types, like Apex classes, Triggers, and LWC files
          files: |
            **/*.cls
            **/*.trigger
            **/*.cmp
            **/*.js
            **/*.css
            **/*.html

      # Step 2: Prepare file list for Code Analyzer
      - name: 'Prepare file list for analysis'
        if: ${{ steps.changed-files.outputs.any_changed == 'true' }}
        id: prepare-files
        run: |
          # Convert space-separated files to comma-separated format
          changed_files="${{ steps.changed-files.outputs.all_changed_files }}"
          
          # Replace spaces with commas for the Code Analyzer
          formatted_files=$(echo "$changed_files" | tr ' ' ',')
          
          echo "target-files=$formatted_files" >> $GITHUB_OUTPUT

      # Step 3: Run Code Analyzer with custom output handling
      - name: 'Run Salesforce Code Analyzer on changed files'
        if: ${{ steps.changed-files.outputs.any_changed == 'true' }}
        continue-on-error: true
        id: scan-step
        run: |
          # Run the analyzer directly with sf CLI for more control
          sf code-analyzer run \
            --view detail \
            --output-file sfca_results.json \
            --target "${{ steps.prepare-files.outputs.target-files }}"
          
          # Check if results file exists and debug its content
          if [ -f sfca_results.json ]; then
            echo "scan-completed=true" >> $GITHUB_OUTPUT
            
            echo "=== COMPLETE JSON STRUCTURE DEBUG ==="
            echo "JSON file size: $(wc -c < sfca_results.json) bytes"
            echo "JSON type: $(jq -r 'type' sfca_results.json)"
            echo ""
            echo "=== FULL JSON CONTENT (first 100 lines) ==="
            head -100 sfca_results.json
            echo ""
            echo "=== END JSON CONTENT ==="
            
            # Count total violations with multiple approaches
            total_violations_method1=$(jq -r 'length' sfca_results.json 2>/dev/null || echo "0")
            total_violations_method2=$(jq -r '[.[] | select(has("violations")) | .violations[]] | length' sfca_results.json 2>/dev/null || echo "0")
            total_violations_method3=$(jq -r '[.[]] | length' sfca_results.json 2>/dev/null || echo "0")
            
            echo "Violation count method 1 (length): $total_violations_method1"
            echo "Violation count method 2 (has violations): $total_violations_method2"
            echo "Violation count method 3 (all items): $total_violations_method3"
            
            # Use the highest count that makes sense
            if [ "$total_violations_method1" -gt 0 ]; then
              total_violations=$total_violations_method1
            elif [ "$total_violations_method2" -gt 0 ]; then
              total_violations=$total_violations_method2
            else
              total_violations=$total_violations_method3
            fi
            
            echo "Final violation count: $total_violations"
            echo "num-violations=$total_violations" >> $GITHUB_OUTPUT
          else
            echo "scan-completed=false" >> $GITHUB_OUTPUT
            echo "num-violations=0" >> $GITHUB_OUTPUT
          fi

      # Step 4: Custom violation summary and display
      - name: 'Custom Code Quality Report'
        if: ${{ steps.scan-step.outputs.scan-completed == 'true' }}
        run: |
          echo "# 🔍 Code Quality Analysis Report" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
          # First, let's understand the exact structure
          echo "=== ANALYZING JSON STRUCTURE ==="
          if [ -f sfca_results.json ]; then
            echo "Sample first violation structure:"
            jq -r '.[0] // "No first element"' sfca_results.json 2>/dev/null || echo "Failed to get first element"
            echo ""
            echo "All keys in first element:"
            jq -r '.[0] | keys? // "No keys"' sfca_results.json 2>/dev/null || echo "Failed to get keys"
            echo ""
            echo "Sample of 3 violations:"
            jq -r '.[0:3]' sfca_results.json 2>/dev/null || echo "Failed to get sample"
          fi
          echo "=== END STRUCTURE ANALYSIS ==="
          
          # Count violations by severity using the actual structure
          critical_count=$(jq -r '[.[] | select(.severity == 1 or .severity == "1")] | length' sfca_results.json 2>/dev/null || echo "0")
          high_count=$(jq -r '[.[] | select(.severity == 2 or .severity == "2")] | length' sfca_results.json 2>/dev/null || echo "0")
          medium_count=$(jq -r '[.[] | select(.severity == 3 or .severity == "3")] | length' sfca_results.json 2>/dev/null || echo "0")
          low_count=$(jq -r '[.[] | select(.severity == 4 or .severity == "4")] | length' sfca_results.json 2>/dev/null || echo "0")
          info_count=$(jq -r '[.[] | select(.severity == 5 or .severity == "5")] | length' sfca_results.json 2>/dev/null || echo "0")
          
          total_violations=${{ steps.scan-step.outputs.num-violations }}
          
          echo "=== VIOLATION COUNTS ==="
          echo "Critical: $critical_count"
          echo "High: $high_count" 
          echo "Medium: $medium_count"
          echo "Low: $low_count"
          echo "Info: $info_count"
          echo "Total: $total_violations"
          echo "=== END COUNTS ==="
          
          # Summary table
          echo "## 📊 Violation Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Severity | Count | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|----------|-------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| 🔴 Critical | $critical_count | $([ $critical_count -eq 0 ] && echo "✅ Pass" || echo "❌ Fail") |" >> $GITHUB_STEP_SUMMARY
          echo "| 🟠 High | $high_count | $([ $high_count -eq 0 ] && echo "✅ Pass" || echo "⚠️ Review") |" >> $GITHUB_STEP_SUMMARY
          echo "| 🟡 Medium | $medium_count | $([ $medium_count -eq 0 ] && echo "✅ Pass" || echo "ℹ️ Consider") |" >> $GITHUB_STEP_SUMMARY
          echo "| 🔵 Low | $low_count | $([ $low_count -eq 0 ] && echo "✅ Pass" || echo "ℹ️ Optional") |" >> $GITHUB_STEP_SUMMARY
          echo "| ⚪ Info | $info_count | $([ $info_count -eq 0 ] && echo "✅ Pass" || echo "ℹ️ Info") |" >> $GITHUB_STEP_SUMMARY
          echo "| **Total** | **$total_violations** | $([ $total_violations -eq 0 ] && echo "✅ **PASS**" || echo "❌ **REVIEW REQUIRED**") |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
          if [ $total_violations -gt 0 ]; then
            echo "## 🚨 Issues Found" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "The following issues were detected in your code changes:" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            
            # Show all violations with corrected field access
            echo "### 📋 All Violations" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            
            # Try different approaches to extract violation info
            jq -r '
              .[] | 
              "- **" + (.fileName // .filename // .file // (.location | split("(")[0] // "Unknown File")) + "** (Line " + 
              (
                if .line then (.line | tostring)
                elif .location then (.location | capture("\\((?<line>[0-9]+):") | .line)
                else "?"
