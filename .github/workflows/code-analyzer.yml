name: Salesforce Code Analyzer

on:
  pull_request:
    branches:
      - development
    types: [opened, edited, synchronized, reopened]
  push:
    branches:
      - development

jobs:
  salesforce-code-analyzer-scan:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
    steps:
      - name: 'Check out source code'
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # Install Salesforce CLI
      - name: 'Install Salesforce CLI'
        run: npm install -g @salesforce/cli@latest

      # Install Code Analyzer Plugin
      - name: 'Install Salesforce Code Analyzer Plugin'
        run: sf plugins install code-analyzer@latest

      # Step 1: Find all changed files and create a list
      - name: 'Get changed files in PR'
        id: changed-files
        uses: tj-actions/changed-files@v44
        with:
          files: |
            **/*.cls
            **/*.trigger
            **/*.cmp
            **/*.js
            **/*.css
            **/*.html

      # Step 2: Prepare file list for Code Analyzer
      - name: 'Prepare file list for analysis'
        if: ${{ steps.changed-files.outputs.any_changed == 'true' }}
        id: prepare-files
        run: |
          changed_files="${{ steps.changed-files.outputs.all_changed_files }}"
          formatted_files=$(echo "$changed_files" | tr ' ' ',')
          echo "target-files=$formatted_files" >> $GITHUB_OUTPUT

      # Step 3: Run Code Analyzer with custom output handling
      - name: 'Run Salesforce Code Analyzer on changed files'
        if: ${{ steps.changed-files.outputs.any_changed == 'true' }}
        continue-on-error: true
        id: scan-step
        run: |
          # Run the analyzer directly with sf CLI for more control
          sf code-analyzer run \
            --view detail \
            --output-file sfca_results.json \
            --target "${{ steps.prepare-files.outputs.target-files }}"
          
          # Check if results file exists and debug its content
          if [ -f sfca_results.json ]; then
            echo "scan-completed=true" >> $GITHUB_OUTPUT
            
            echo "=== COMPLETE JSON DEBUG ==="
            echo "JSON file size: $(wc -c < sfca_results.json) bytes"
            echo "JSON type: $(jq -r 'type' sfca_results.json)"
            echo "JSON keys: $(jq -r 'keys' sfca_results.json)"
            echo ""
            echo "=== FULL JSON CONTENT ==="
            cat sfca_results.json
            echo ""
            echo "=== END JSON DEBUG ==="
            
            # Count violations based on object structure
            # The JSON is likely structured as: {"violations": [...], "summary": {...}, etc.}
            total_violations=0
            
            # Try different ways to count violations
            if jq -e '.violations' sfca_results.json > /dev/null 2>&1; then
              total_violations=$(jq '.violations | length' sfca_results.json 2>/dev/null || echo "0")
              echo "Found violations array with $total_violations items"
            elif jq -e '.results' sfca_results.json > /dev/null 2>&1; then
              total_violations=$(jq '.results | length' sfca_results.json 2>/dev/null || echo "0")
              echo "Found results array with $total_violations items"
            else
              # Count all arrays in the object
              total_violations=$(jq '[.[] | select(type == "array")] | map(length) | add // 0' sfca_results.json 2>/dev/null || echo "0")
              echo "Counted arrays in object: $total_violations"
            fi
            
            echo "Total violations: $total_violations"
            echo "num-violations=$total_violations" >> $GITHUB_OUTPUT
          else
            echo "scan-completed=false" >> $GITHUB_OUTPUT
            echo "num-violations=0" >> $GITHUB_OUTPUT
          fi

      # Step 4: Custom violation summary and display
      - name: 'Custom Code Quality Report'
        if: ${{ steps.scan-step.outputs.scan-completed == 'true' }}
        run: |
          echo "# 🔍 Code Quality Analysis Report" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
          total_violations=${{ steps.scan-step.outputs.num-violations }}
          
          # Count violations by severity
          critical_count=0
          high_count=0
          medium_count=0
          low_count=0
          info_count=0
          
          if [ -f sfca_results.json ]; then
            # Analyze the object structure
            echo "=== JSON STRUCTURE ANALYSIS ==="
            echo "JSON is valid: $(jq empty sfca_results.json && echo 'Yes' || echo 'No')"
            echo "JSON type: $(jq -r 'type' sfca_results.json 2>/dev/null || echo 'unknown')"
            echo "JSON keys: $(jq -r 'keys' sfca_results.json 2>/dev/null || echo 'unknown')"
            
            # Find where violations are stored
            violations_path=""
            if jq -e '.violations' sfca_results.json > /dev/null 2>&1; then
              violations_path=".violations"
              echo "Violations found at: .violations"
            elif jq -e '.results' sfca_results.json > /dev/null 2>&1; then
              violations_path=".results"
              echo "Violations found at: .results"
            else
              # Find the first array in the object
              violations_path=$(jq -r 'to_entries | map(select(.value | type == "array")) | .[0].key // "none"' sfca_results.json 2>/dev/null)
              if [ "$violations_path" != "none" ] && [ -n "$violations_path" ]; then
                violations_path=".$violations_path"
                echo "Violations found at: $violations_path"
              else
                echo "No violations array found"
              fi
            fi
            
            # Count by severity if we found violations
            if [ -n "$violations_path" ] && [ "$violations_path" != ".none" ]; then
              echo "Counting violations using path: $violations_path"
              
              critical_count=$(jq "[$violations_path[] | select(.severity == 1 or .severity == \"1\")] | length" sfca_results.json 2>/dev/null || echo "0")
              high_count=$(jq "[$violations_path[] | select(.severity == 2 or .severity == \"2\")] | length" sfca_results.json 2>/dev/null || echo "0")
              medium_count=$(jq "[$violations_path[] | select(.severity == 3 or .severity == \"3\")] | length" sfca_results.json 2>/dev/null || echo "0")
              low_count=$(jq "[$violations_path[] | select(.severity == 4 or .severity == \"4\")] | length" sfca_results.json 2>/dev/null || echo "0")
              info_count=$(jq "[$violations_path[] | select(.severity == 5 or .severity == \"5\")] | length" sfca_results.json 2>/dev/null || echo "0")
              
              echo "Sample violation structure:"
              jq "$violations_path[0] // \"No violations\"" sfca_results.json 2>/dev/null || echo "Failed to get sample"
            fi
          fi
          
          echo "Violation counts:"
          echo "Critical: $critical_count"
          echo "High: $high_count"
          echo "Medium: $medium_count"
          echo "Low: $low_count"
          echo "Info: $info_count"
          echo "Total: $total_violations"
          
          # Summary table
          echo "## 📊 Violation Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Severity | Count | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|----------|-------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| 🔴 Critical | $critical_count | $([ $critical_count -eq 0 ] && echo "✅ Pass" || echo "❌ Fail") |" >> $GITHUB_STEP_SUMMARY
          echo "| 🟠 High | $high_count | $([ $high_count -eq 0 ] && echo "✅ Pass" || echo "⚠️ Review") |" >> $GITHUB_STEP_SUMMARY
          echo "| 🟡 Medium | $medium_count | $([ $medium_count -eq 0 ] && echo "✅ Pass" || echo "ℹ️ Consider") |" >> $GITHUB_STEP_SUMMARY
          echo "| 🔵 Low | $low_count | $([ $low_count -eq 0 ] && echo "✅ Pass" || echo "ℹ️ Optional") |" >> $GITHUB_STEP_SUMMARY
          echo "| ⚪ Info | $info_count | $([ $info_count -eq 0 ] && echo "✅ Pass" || echo "ℹ️ Info") |" >> $GITHUB_STEP_SUMMARY
          echo "| **Total** | **$total_violations** | $([ $total_violations -eq 0 ] && echo "✅ **PASS**" || echo "❌ **REVIEW REQUIRED**") |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
          if [ $total_violations -gt 0 ] && [ -n "$violations_path" ] && [ "$violations_path" != ".none" ]; then
            echo "## 🚨 Issues Found" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "The following issues were detected in your code changes:" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            
            echo "### 📋 Violation Details" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            
            # Extract violation details using the correct path
            jq -r "
              $violations_path[] | 
              \"- **\" + (.fileName // .filename // .file // (.location // \"\" | split(\" (\")[0]) // \"Unknown File\") + \"** (Line \" + 
              (
                if .line then (.line | tostring)
                elif .location then (.location | capture(\"\\\\((?<line>[0-9]+):\") | .line)
                else \"?\"
                end
              ) + \")\" +
              \"\\n  - **Rule**: \\\`\" + (.ruleName // .rule // .name // \"Unknown\") + \"\\\`\" +
              \"\\n  - **Severity**: \" + (
                if .severity == 1 or .severity == \"1\" then \"🔴 Critical\"
                elif .severity == 2 or .severity == \"2\" then \"🟠 High\"  
                elif .severity == 3 or .severity == \"3\" then \"🟡 Medium\"
                elif .severity == 4 or .severity == \"4\" then \"🔵 Low\"
                elif .severity == 5 or .severity == \"5\" then \"⚪ Info\"
                else \"❓ Unknown (\" + (.severity | tostring) + \")\"
                end
              ) +
              \"\\n  - **Engine**: \" + (.engine // \"Unknown\") +
              \"\\n  - **Message**: \" + (.message // \"No description\") +
              (if .location then \"\\n  - **Location**: \" + .location else \"\" end) +
              \"\\n\"
            " sfca_results.json >> $GITHUB_STEP_SUMMARY 2>/dev/null || echo "Failed to parse violations for summary" >> $GITHUB_STEP_SUMMARY
            
            # Show raw JSON for debugging
            echo "### 🔍 Raw JSON Data" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo '```json' >> $GITHUB_STEP_SUMMARY
            jq '.' sfca_results.json >> $GITHUB_STEP_SUMMARY 2>/dev/null || echo "Failed to display raw JSON" >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
          elif [ $total_violations -eq 0 ]; then
            echo "## ✅ Great Job!" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "No code quality issues found in your changes. Your code meets all quality standards! 🎉" >> $GITHUB_STEP_SUMMARY
          else
            echo "## ⚠️ Unable to Parse Violations" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "Violations were detected but couldn't be parsed. Please check the raw JSON below:" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo '```json' >> $GITHUB_STEP_SUMMARY
            jq '.' sfca_results.json >> $GITHUB_STEP_SUMMARY 2>/dev/null || echo "Failed to display JSON" >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
          fi
          
          # Console output
          echo ""
          echo "════════════════════════════════════════════════════════════════"
          echo "🔍 SALESFORCE CODE QUALITY ANALYSIS COMPLETE"
          echo "════════════════════════════════════════════════════════════════"
          echo ""
          echo "📊 SUMMARY:"
          echo "  🔴 Critical: $critical_count"
          echo "  🟠 High:     $high_count"
          echo "  🟡 Medium:   $medium_count"
          echo "  🔵 Low:      $low_count"
          echo "  ⚪ Info:     $info_count"
          echo "  ────────────────"
          echo "  📈 Total:    $total_violations"
          echo ""
          
          if [ $total_violations -gt 0 ]; then
            echo "❌ ACTION REQUIRED: Please review and address the issues above."
            echo "📋 Check the 'Summary' tab for detailed violation information."
          else
            echo "✅ EXCELLENT: No violations found! Your code is clean. 🎉"
          fi
          echo ""
          echo "════════════════════════════════════════════════════════════════"

      # Step 5: Determine build status
      - name: 'Evaluate Build Status'
        if: ${{ steps.scan-step.outputs.scan-completed == 'true' }}
        run: |
          total_violations=${{ steps.scan-step.outputs.num-violations }}
          
          if [ $total_violations -gt 0 ]; then
            echo "⚠️ Build completed with $total_violations violations detected."
            echo "💡 Please review the violations in the Summary tab."
            exit 0
          else
            echo "✅ Build passed with no violations!"
            exit 0
          fi

      # Step 6: Handle case when no files changed
      - name: 'No files to analyze'
        if: ${{ steps.changed-files.outputs.any_changed != 'true' }}
        run: |
          echo "ℹ️ No relevant files were changed in this commit/PR."
          echo "✅ Code analysis skipped - no Salesforce files to analyze."