name: Salesforce Code Analyzer

on:
  pull_request:
    branches:
      - main
    types: [opened, edited, synchronized, reopened]

jobs: # <-- This is at the top level
  salesforce-code-analyzer-scan: # <-- This job is nested inside 'jobs'
    runs-on: ubuntu-latest

    permissions:
      pull-requests: write

    steps: # <-- This is nested inside the job
      - name: 'Check out source code'
        uses: actions/checkout@v4
      - name: 'Run Salesforce Code Analyzer'
        uses: forcedotcom/run-code-analyzer@v2
        id: scan-step
        with:
          run-arguments: '--view detail --output-file sfca_results.json'
      - name: 'Check for violations and fail job if necessary'
        if: ${{ steps.scan-step.outputs.num-violations > 0 }}
        run: |
          echo "Salesforce Code Analyzer found ${{ steps.scan-step.outputs.num-violations }} violations."
          exit 1
