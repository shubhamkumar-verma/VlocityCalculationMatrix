name: Salesforce Code Analyzer

on:
  pull_request:
    branches:
      - development
    types: [opened, edited, synchronized, reopened]
  push:
    branches:
      - development

jobs:
  salesforce-code-analyzer-scan:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
    steps:
      - name: 'Check out source code'
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # Step 1: Find all changed files and create a list
      - name: 'Get changed files in PR'
        id: changed-files
        uses: tj-actions/changed-files@v44
        with:
          files: |
            **/*.cls
            **/*.trigger
            **/*.cmp
            **/*.js
            **/*.css
            **/*.html

      # Step 2: Run Salesforce Code Analyzer on changed files
      # This step uses a custom 'run' command to correctly handle multiple file paths
      # and passes the files as a formatted array to the sf code-analyzer run command.
      - name: 'Run Salesforce Code Analyzer on changed files'
        if: ${{ steps.changed-files.outputs.any_changed == 'true' }}
        run: |
          changed_files_array=(${{ steps.changed-files.outputs.all_changed_files }})
          sf code-analyzer run --view detail --output-file sfca_results.json --target "${changed_files_array[@]}"

      # Step 3: Check for violations and set job status
      # This step is modified to run the 'if' check after the scan to ensure the
      # JSON file exists.
      - name: 'Check for violations and set job status'
        if: always()
        run: |
          if [ -f sfca_results.json ]; then
            violations=$(jq '.length' sfca_results.json)
            if [ "$violations" -gt 0 ]; then
              echo "Salesforce Code Analyzer found $violations violations."
              exit 1
            fi
          fi
          echo "Salesforce Code Analyzer completed with no violations."